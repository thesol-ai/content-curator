name = "content-curator"
main = "apps/worker-api/src/index.ts"
compatibility_date = "2026-05-01"
workers_dev = true

[[d1_databases]]
binding = "DB"
database_name = "content-curator-db"
database_id = "00000000-0000-0000-0000-000000000000"
migrations_dir = "migrations"

[triggers]
crons = ["*/30 * * * *"]

# ── Local / Default ────────────────────────────────────────────
[vars]
ENVIRONMENT   = "local"
LOG_LEVEL     = "info"

# Apify pipeline
APIFY_CURATION_ENABLED      = "false"
APIFY_CURATION_DRY_RUN      = "true"
APIFY_MAX_ITEMS_PER_SOURCE  = "50"

# AI — Scoring (Claude Haiku — فقط برای scoring و risk assessment)
# مدل‌های موجود: claude-haiku-4-5-20251001
AI_SCORING_MODEL              = "claude-haiku-4-5-20251001"
AI_SCORE_THRESHOLD_DEFAULT    = "75"
AI_MAX_CALLS_PER_DAY          = "10"
AI_DAILY_TOKEN_BUDGET         = "50000"
AI_MAX_CANDIDATES_PER_RUN     = "50"
AI_MAX_TEXT_CHARS_PER_ITEM    = "400"
AI_MAX_OUTPUT_TOKENS          = "2048"
AI_MAX_RETRIES                = "1"

# AI — Translation
# TRANSLATION_PROVIDER: 'gemini' | 'openai' | 'claude'
#   gemini  → ارزان‌ترین، Flash-Lite ~$0.04 per 90K output tokens
#   openai  → gpt-4o-mini ~$0.05 per 90K output tokens
#   claude  → گران‌ترین، فقط اگر نه Gemini نه OpenAI دارید
#
# مدل‌های Gemini:
#   gemini-2.5-flash-lite    → ارزان‌ترین ($0.10/$0.40 per 1M)
#   gemini-2.5-flash         → متعادل ($0.30/$2.50 per 1M)
#   gemini-2.5-pro           → قوی‌ترین ($1.25/$10 per 1M)
#
# مدل‌های OpenAI:
#   gpt-4.1-nano  → ارزان‌ترین ($0.10/$0.40 per 1M)
#   gpt-4o-mini   → متعادل ($0.15/$0.60 per 1M)
#   gpt-4.1-mini  → خوب ($0.40/$1.60 per 1M)
TRANSLATION_PROVIDER = "gemini"
TRANSLATION_MODEL    = "gemini-2.5-flash-lite"

# Telegram
TELEGRAM_FINAL_PUBLISH_ENABLED     = "false"
TELEGRAM_PUBLISH_SCHEDULER_ENABLED = "false"
TELEGRAM_PUBLISH_DUE_LIMIT         = "5"

# Media
MEDIA_PROCESSING_MODE = "direct_url"

# ── Production ─────────────────────────────────────────────────
[env.production]
name = "content-curator"
workers_dev = true

[env.production.vars]
ENVIRONMENT   = "production"
LOG_LEVEL     = "info"

APIFY_CURATION_ENABLED      = "false"
APIFY_CURATION_DRY_RUN      = "true"
APIFY_MAX_ITEMS_PER_SOURCE  = "100"

AI_SCORING_MODEL              = "claude-haiku-4-5-20251001"
AI_SCORE_THRESHOLD_DEFAULT    = "75"
AI_MAX_CALLS_PER_DAY          = "10"
AI_DAILY_TOKEN_BUDGET         = "50000"
AI_MAX_CANDIDATES_PER_RUN     = "50"
AI_MAX_TEXT_CHARS_PER_ITEM    = "400"
AI_MAX_OUTPUT_TOKENS          = "2048"
AI_MAX_RETRIES                = "1"

TRANSLATION_PROVIDER = "gemini"
TRANSLATION_MODEL    = "gemini-2.5-flash-lite"

TELEGRAM_FINAL_PUBLISH_ENABLED     = "false"
TELEGRAM_PUBLISH_SCHEDULER_ENABLED = "false"
TELEGRAM_PUBLISH_DUE_LIMIT         = "5"

MEDIA_PROCESSING_MODE = "direct_url"

[[env.production.d1_databases]]
binding = "DB"
database_name = "content-curator-db"
database_id = "00000000-0000-0000-0000-000000000000"
migrations_dir = "migrations"
