name = "content-curator"
main = "apps/worker-api/src/index.ts"
compatibility_date = "2026-05-01"
workers_dev = true

# в”Җв”Җ D1 Database в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[[d1_databases]]
binding = "DB"
database_name = "content-curator-db-v2"
database_id = "e0089316-ca39-45ce-b53f-21fa59a921f6"  # вҶҗ ШЁШ§ wrangler d1 create Ш¬Ш§ЫҢЪҜШІЫҢЩҶ Ъ©ЩҶЫҢШҜ
migrations_dir = "migrations"

# в”Җв”Җ R2 Bucket (Ш§Ш®ШӘЫҢШ§ШұЫҢ вҖ” ШЁШұШ§ЫҢ MEDIA_PROCESSING_MODE=r2_storage) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# ЩҫШі Ш§ШІ Ш§ЫҢШ¬Ш§ШҜ bucket: wrangler r2 bucket create content-curator-media
# [[r2_buckets]]
# binding = "MEDIA_BUCKET"
# bucket_name = "content-curator-media"

# в”Җв”Җ Cron в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[triggers]
crons = ["*/5 * * * *"]

# в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
# Local / Default
# в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
[vars]
ENVIRONMENT   = "local"
LOG_LEVEL     = "info"

# в”Җв”Җ Apify в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
APIFY_CURATION_ENABLED      = "true"
APIFY_CURATION_DRY_RUN      = "false"
APIFY_SCHEDULED_CURATION_ENABLED = "false"
APIFY_MAX_ITEMS_PER_SOURCE  = "50"

# в”Җв”Җ AI Scoring (Claude) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# Щ…ШҜЩ„вҖҢЩҮШ§ЫҢ Щ…ЩҲШ¬ЩҲШҜ: claude-haiku-4-5-20251001
AI_SCORING_MODEL              = "claude-haiku-4-5-20251001"
AI_SCORE_THRESHOLD_DEFAULT    = "75"
AI_MAX_CALLS_PER_DAY          = "10"
AI_DAILY_TOKEN_BUDGET         = "50000"
AI_MAX_CANDIDATES_PER_RUN     = "12"
AI_MAX_TEXT_CHARS_PER_ITEM    = "400"
AI_MAX_OUTPUT_TOKENS          = "4096"
AI_MAX_RETRIES                = "1"

# в”Җв”Җ AI Candidate Backlog (Phase 1) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# ЩҮЩ…ЩҮ ЩҫЫҢШҙвҖҢЩҒШұШ¶вҖҢЩҮШ§ ШұЩҲЫҢ safe/off ЩҮШіШӘЩҶШҜ.
# ШӘШ§ ШІЩ…Ш§ЩҶ ЩҒШ№Ш§Щ„вҖҢШіШ§ШІЫҢ ШўЪҜШ§ЩҮШ§ЩҶЩҮ ШҜШұ productionШҢ ЩҮЫҢЪҶ ШӘШәЫҢЫҢШұЫҢ ШҜШұ ШұЩҒШӘШ§Шұ pipeline Ш§ЫҢШ¬Ш§ШҜ ЩҶЩ…ЫҢвҖҢШҙЩҲШҜ.

# в”Җв”Җ AI Translation в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# TRANSLATION_PROVIDER: gemini | openai | claude
# Gemini: gemini-2.5-flash-lite ($0.10/$0.40) | gemini-2.5-flash ($0.30/$2.50)
# OpenAI: gpt-4.1-nano ($0.10/$0.40) | gpt-4o-mini ($0.15/$0.60)
TRANSLATION_PROVIDER = "gemini"
TRANSLATION_MODEL    = "gemini-2.5-flash-lite"

# в”Җв”Җ Telegram в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
TELEGRAM_FINAL_PUBLISH_ENABLED = "false"
TELEGRAM_PUBLISH_SCHEDULER_ENABLED = "true"
TELEGRAM_PUBLISH_DUE_LIMIT         = "4"

# в”Җв”Җ Media Processing в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# direct_url    вҶ’ URL Щ…ШіШӘЩӮЫҢЩ… ШЁЩҮ Telegram (ШіШұЫҢШ№ШҢ ШЁШұШ§ЫҢ ШӘШіШӘ)
# binary_upload вҶ’ ШҜШ§ЩҶЩ„ЩҲШҜ + multipart upload (ШӘЩҲШөЫҢЩҮ ШЁШұШ§ЫҢ production)
# r2_storage    вҶ’ ШҜШ§ЩҶЩ„ЩҲШҜ вҶ’ R2 вҶ’ URL ЩҫШ§ЫҢШҜШ§Шұ (ШЁЩҮШӘШұЫҢЩҶ ЩӮШ§ШЁЩ„ЫҢШӘ Ш§Ш·Щ…ЫҢЩҶШ§ЩҶ)
MEDIA_PROCESSING_MODE     = "direct_url"
MEDIA_GROUP_PARTIAL_PUBLISH_ENABLED = "true"
MEDIA_MAX_DOWNLOAD_MB     = "50"
MEDIA_DOWNLOAD_TIMEOUT_SEC = "60"

# Deduplication window in hours (default 168 = 7 days)
DEDUPE_WINDOW_HOURS = "168"

# R2 public URL (ЩҒЩӮШ· ШЁШұШ§ЫҢ r2_storage mode)
# R2_PUBLIC_BASE_URL = "https://media.yourdomain.com"

# Cloudflare Stream paid fallback is disabled by default.
# It requires STREAM_TRANSCODE_ENABLED=true plus secrets before any Stream API call.
STREAM_TRANSCODE_ENABLED = "false"

# в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
# Production
# в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ

# Apify cost control
[env.production]
name = "content-curator"
workers_dev = true

[env.production.vars]
ENVIRONMENT   = "production"
LOG_LEVEL     = "info"
APIFY_CURATION_ENABLED = "true"
APIFY_CURATION_DRY_RUN = "false"
APIFY_SCHEDULED_CURATION_ENABLED = "false"
APIFY_MAX_ITEMS_PER_SOURCE = "40"
APIFY_RAW_FETCH_LIMIT_PER_SOURCE = "120"
APIFY_ROTATION_ENABLED = "true"
APIFY_ROTATION_INTERVAL_HOURS = "3"
APIFY_ROTATION_WAIT_FOR_FINISH_SECONDS = "60"
APIFY_ROTATION_MAX_SOURCES_PER_TICK = "2"

AI_SCORING_MODEL              = "claude-haiku-4-5-20251001"
AI_SCORE_THRESHOLD_DEFAULT    = "75"
AI_MAX_CALLS_PER_DAY          = "100"
AI_DAILY_TOKEN_BUDGET         = "350000"
AI_MAX_CANDIDATES_PER_RUN     = "10"
AI_MAX_TEXT_CHARS_PER_ITEM    = "400"
AI_MAX_OUTPUT_TOKENS          = "4096"
AI_MAX_RETRIES                = "2"

# в”Җв”Җ AI Candidate Backlog (Phase 1) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# Production: enabled explicitly so fresh items are queued and drained safely.
AI_CANDIDATE_BACKLOG_ENABLED = "true"
AI_FAIR_SOURCE_PICKER_ENABLED = "true"
AI_SCORING_BATCH_SIZE = "5"
AI_MAX_SCORING_BATCHES_PER_RUN = "1"
AI_CANDIDATE_BACKLOG_DRAIN_LIMIT = "10"
AI_CANDIDATE_MAX_ATTEMPTS = "2"
AI_CANDIDATE_MAX_AGE_HOURS = "12"
AI_BACKLOG_INLINE_DRAIN_ENABLED = "true"
AI_FAIR_SOURCE_PICKER_POOL_MULTIPLIER = "6"

# в”Җв”Җ Phase 6F: Adaptive rotation + queue-health controller + scheduler в”Җв”Җ
# All default to current behavior. Roll out one flag at a time per channel.
APIFY_ROTATION_CONTINUOUS_ENABLED = "true"
APIFY_ROTATION_SLOT_MINUTES         = "60"     # one designated source per 60-min slot (3 enabled sources / 3h, evenly)
QUEUE_HEALTH_CONTROLLER_ENABLED = "true"
QUEUE_HEALTH_MIN_SCHEDULED_NEXT_6H  = "3"      # healthy floor for scheduled posts in next 6h
QUEUE_HEALTH_STARVING_MAX_BATCHES   = "3"      # scoring batches per tick while starving (normal stays AI_MAX_SCORING_BATCHES_PER_RUN)
QUEUE_HEALTH_STARVING_SCORING_CALL_BONUS = "50"
QUEUE_HEALTH_CHANNEL_ID             = "crypto_fa_pilot"
PUBLISH_SCHEDULER_GAP_FILL_ENABLED = "true"
# в”Җв”Җ Phase 6G: caption quality в”Җв”Җ
AI_TRANSLATION_MAX_TEXT_CHARS       = "400"    # INERT default (== AI_MAX_TEXT_CHARS_PER_ITEM). Raise to ~900 to give the caption model more context (6G).
# в”Җв”Җ Phase 6H: cost вҖ” run cheap dedupe/audience gates before paid translation в”Җв”Җ
BACKLOG_TRANSLATE_AFTER_GATES_ENABLED = "true"
# в”Җв”Җ Phase 6I: enforce per-source daily cap (channels.max_posts_per_source_per_day) в”Җв”Җ
PUBLISH_ENFORCE_SOURCE_DAILY_CAP_ENABLED = "true"
# в”Җв”Җ Phase 6J: audience-aware scoring guidance (Iranian/Persian now; ar/en/ru later) в”Җв”Җ
AUDIENCE_PROFILE_SCORING_ENABLED = "true"
# в”Җв”Җ Phase 6K: story intelligence (OBSERVE-ONLY; structured story_key) в”Җв”Җ
STORY_INTELLIGENCE_ENABLED = "true"
STORY_INTELLIGENCE_OBSERVE_ONLY = "false"
# в”Җв”Җ Phase 6K active reject (default OFF) + window/follow-up в”Җв”Җ
STORY_INTELLIGENCE_REJECT_ENABLED = "true"
STORY_INTELLIGENCE_WINDOW_HOURS = "72"
STORY_INTELLIGENCE_FOLLOWUP_ALLOW_ENABLED = "true"
STORY_INTELLIGENCE_SEMANTIC_REJECT_ENABLED = "false"  # keep hand-tuned semantic heuristic from rejecting
STORY_INTELLIGENCE_RETENTION_DAYS = "30"
# в”Җв”Җ RSS feed ingestion (independent, zero-Apify-cost; default OFF for dark launch) в”Җв”Җ
RSS_INGEST_ENABLED = "false"
RSS_FEED_PROBE_ONLY = "false"
RSS_INGEST_INTERVAL_MIN = "30"
RSS_MAX_ITEMS_PER_FEED = "4"
RSS_MAX_NEW_ITEMS_PER_RUN = "12"
RSS_MAX_NEW_ITEMS_PER_DAY = "80"
RSS_FEED_TIMEOUT_SEC = "10"
JINA_READER_ENABLED = "false"
JINA_MIN_CONTENT_CHARS = "500"
JINA_MAX_CALLS_PER_DAY = "50"
DUPLICATE_AI_JUDGE_ENABLED = "true"
DUPLICATE_AI_JUDGE_BATCH_SIZE = "5"
DUPLICATE_AI_JUDGE_MAX_PRIORS = "20"
DUPLICATE_AI_JUDGE_WINDOW_HOURS = "72"
DUPLICATE_AI_JUDGE_MAX_TEXT_CHARS = "220"
DUPLICATE_AI_JUDGE_MAX_CALLS_PER_DAY = "14"
DUPLICATE_AI_JUDGE_CONFIDENCE_THRESHOLD = "0.78"     # retention for story_intelligence_events (daily-guarded cleanup)
# в”Җв”Җ AI cost attribution by source (default OFF; needs migration 0019) в”Җв”Җ
AI_COST_ATTRIBUTION_ENABLED = "true"
AI_USAGE_ATTRIBUTION_RETENTION_DAYS = "45"
# в”Җв”Җ Active source-reputation weighting (default OFF; with exploration) в”Җв”Җ
SOURCE_REPUTATION_WEIGHTING_ENABLED = "true"
SOURCE_REPUTATION_EXPLORATION_PCT = "20"
SOURCE_REPUTATION_MIN_SAMPLE = "20"
SOURCE_REPUTATION_MAX_WEIGHT = "2.0"
SOURCE_REPUTATION_MIN_WEIGHT = "0.15"
SOURCE_REPUTATION_RECENT_RUN_COOLDOWN_SLOTS = "6"  # cool down sources scraped in the last N slots
# в”Җв”Җ Queue-quality controller (steer toward diversity; default OFF) в”Җв”Җ
QUEUE_QUALITY_CONTROLLER_ENABLED = "true"
QUEUE_QUALITY_MIN_UNIQUE_SOURCES_NEXT_6H = "2"
QUEUE_QUALITY_MAX_SOURCE_SHARE_NEXT_24H = "0.4"
QUEUE_QUALITY_MIN_UNIQUE_STORIES_NEXT_6H = "2"
# в”Җв”Җ Caption quality repair-first (default OFF) в”Җв”Җ
CAPTION_QUALITY_REPAIR_ENABLED = "true"
CAPTION_QUALITY_REJECT_ENABLED = "false"
CAPTION_QUALITY_MIN_SCORE = "70"

TRANSLATION_PROVIDER = "gemini"
TRANSLATION_MODEL    = "gemini-2.5-flash-lite"
TRANSLATION_BATCH_SIZE = "3"
TRANSLATION_DEBUG_ENABLED = "false"
TELEGRAM_FINAL_PUBLISH_ENABLED = "true"
TELEGRAM_PUBLISH_SCHEDULER_ENABLED = "true"
TELEGRAM_PUBLISH_DUE_LIMIT         = "4"
PUBLISH_DELAY_EXPIRING_MEDIA_DEFAULT_MINUTES = "20"
PUBLISH_DELAY_EXPIRING_MEDIA_HIGH_MINUTES = "10"
PUBLISH_DELAY_LOW_MINUTES = "45"
PUBLISH_DELAY_NORMAL_MINUTES = "20"
PUBLISH_DELAY_HIGH_MINUTES = "10"
PUBLISH_DELAY_BREAKING_MINUTES = "5"
PUBLISH_SOURCE_ACCOUNT_GAP_MINUTES = "90"

# ШҜШұ production Ш§ШІ binary_upload Ш§ШіШӘЩҒШ§ШҜЩҮ Ъ©ЩҶЫҢШҜ
MEDIA_PROCESSING_MODE      = "binary_upload"
MEDIA_GROUP_PARTIAL_PUBLISH_ENABLED = "true"
MEDIA_MAX_DOWNLOAD_MB      = "50"
MEDIA_DOWNLOAD_TIMEOUT_SEC = "90"

DEDUPE_WINDOW_HOURS = "168"

# Paid video transcoding fallback. Keep disabled unless explicitly approved.
STREAM_TRANSCODE_ENABLED = "false"

MARKET_SNAPSHOT_ENABLED = "true"
MARKET_SNAPSHOT_INTERVAL_HOURS = "1"
MARKET_SNAPSHOT_SLOTS = "09:05,12:35,15:35,18:35,21:35"
MARKET_SNAPSHOT_CHANNEL_ID = "crypto_fa_pilot"
APIFY_MAX_ATTEMPTS_PER_SLOT = "1"
APIFY_ADAPTIVE_ATTEMPT_SELECTION_ENABLED = "true"
APIFY_ATTEMPT_YIELD_DOWNSTREAM_ENABLED = "true"
APIFY_SECOND_ATTEMPT_DAILY_BUDGET = "0"
APIFY_ATTEMPT_YIELD_HISTORY_DAYS = "7"
APIFY_ATTEMPT_YIELD_MIN_SAMPLE = "3"
[[env.production.d1_databases]]
binding = "DB"
database_name = "content-curator-db-v2"
database_id = "e0089316-ca39-45ce-b53f-21fa59a921f6"  # вҶҗ Ш¬Ш§ЫҢЪҜШІЫҢЩҶ Ъ©ЩҶЫҢШҜ

# [[env.production.r2_buckets]]
# binding = "MEDIA_BUCKET"
# bucket_name = "content-curator-media"

# в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
# Cloudflare Stream (Ш§Ш®ШӘЫҢШ§ШұЫҢ вҖ” ШЁШұШ§ЫҢ video transcoding)
# ШЁШҜЩҲЩҶ Ш§ЫҢЩҶ: video ЩҮШ§ЫҢ ЩҶШ§ШіШ§ШІЪҜШ§Шұ вҶ’ sendDocument fallback
# ШЁШ§ Ш§ЫҢЩҶ: video transcode вҶ’ H.264 MP4 вҶ’ sendVideo
#
# ШұШ§ЩҮвҖҢШ§ЩҶШҜШ§ШІЫҢ:
