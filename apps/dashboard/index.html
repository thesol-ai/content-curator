<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Content Curator — Control</title>
<style>
  :root{
    --bg:#0c0c0e; --surface:#151518; --surface-2:#1b1b20; --dim:#2e2e35;
    --text:#e6e6ea; --muted:#8a8a98; --faint:#5a5a68;
    --green:#22c55e; --red:#ef4444; --amber:#f59e0b; --blue:#60a5fa;
    --purple:#a78bfa; --cyan:#22d3ee;
    --radius:10px; --gap:16px;
    --font:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
    --mono:'JetBrains Mono','Fira Code',ui-monospace,monospace;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;line-height:1.5}
  a{color:var(--blue);text-decoration:none}
  button{font-family:inherit;cursor:pointer}
  button:disabled{opacity:.5;cursor:not-allowed}
  code,.mono{font-family:var(--mono)}

  /* ---------- App shell ----------
     The layout is locked to the viewport height. The sidebar and the main
     column are each their own independent scroll context, so the sidebar
     stays fixed as a persistent navigation element while only the content
     area scrolls. (Previously the whole grid grew with the page and carried
     the sidebar away.) */
  .app{display:none}
  .layout{display:grid;grid-template-columns:230px 1fr;height:100vh;overflow:hidden}
  .sidebar{background:var(--surface);border-right:1px solid var(--dim);padding:18px 12px;
           display:flex;flex-direction:column;gap:6px;
           height:100vh;position:sticky;top:0;overflow-y:auto}
  .brand{font-weight:700;font-size:15px;padding:6px 10px 2px}
  .brand small{display:block;font-weight:400;font-size:11px;color:var(--muted);margin-top:3px}
  .env-pill{font-family:var(--mono);font-size:11px;color:var(--cyan);padding:2px 10px 14px}

  .nav-group{margin-top:10px}
  .nav-group-label{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);padding:6px 10px 4px}
  .nav-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;color:var(--muted);font-size:13px;cursor:pointer;border:none;background:none;width:100%;text-align:left}
  .nav-item:hover{background:var(--surface-2);color:var(--text)}
  .nav-item.active{background:var(--surface-2);color:var(--text);box-shadow:inset 2px 0 0 var(--blue)}
  .nav-item .ico{width:16px;text-align:center;opacity:.85}
  .nav-item .badge{margin-left:auto;font-family:var(--mono);font-size:11px;background:var(--dim);color:var(--text);padding:1px 7px;border-radius:20px}

  .dev-zone{margin-top:auto;border-top:1px solid var(--dim);padding-top:10px}
  .dev-zone .nav-group-label{color:var(--amber)}

  /* ---------- Main ---------- */
  .main{display:flex;flex-direction:column;min-width:0;height:100vh;overflow:hidden}
  .topbar{height:54px;flex:0 0 54px;border-bottom:1px solid var(--dim);display:flex;align-items:center;gap:14px;padding:0 22px;background:var(--surface)}
  .page-title{font-weight:600;font-size:15px}
  .topbar .spacer{flex:1}
  .pill{font-family:var(--mono);font-size:11px;padding:3px 10px;border-radius:20px;background:var(--surface-2);color:var(--muted);border:1px solid var(--dim)}
  .pill.on{color:var(--green);border-color:rgba(34,197,94,.4)}
  .pill.off{color:var(--red);border-color:rgba(239,68,68,.4)}
  .win-select{background:var(--surface-2);color:var(--text);border:1px solid var(--dim);border-radius:8px;padding:5px 8px;font-size:12px;font-family:var(--mono)}

  .content{padding:22px;overflow:auto;flex:1}

  /* ---------- Cards / grid ---------- */
  .grid{display:grid;gap:var(--gap)}
  .grid.cols-4{grid-template-columns:repeat(4,1fr)}
  .grid.cols-3{grid-template-columns:repeat(3,1fr)}
  .grid.cols-2{grid-template-columns:repeat(2,1fr)}
  @media(max-width:1100px){.grid.cols-4{grid-template-columns:repeat(2,1fr)}.grid.cols-3{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:700px){.layout{grid-template-columns:1fr}.sidebar{display:none}.grid.cols-4,.grid.cols-3,.grid.cols-2{grid-template-columns:1fr}}

  .card{background:var(--surface);border:1px solid var(--dim);border-radius:var(--radius);padding:16px}
  .card h3{margin:0 0 12px;font-size:13px;font-weight:600;color:var(--muted);letter-spacing:.02em}
  .card-head{display:flex;align-items:center;gap:10px;margin-bottom:12px}
  .card-head h3{margin:0}
  .card-head .spacer{flex:1}
  .stat{background:var(--surface);border:1px solid var(--dim);border-radius:var(--radius);padding:14px 16px}
  .stat .label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
  .stat .value{font-family:var(--mono);font-size:26px;font-weight:600;margin-top:6px}
  .stat .sub{font-size:11px;color:var(--faint);margin-top:4px}
  .stat .value.good{color:var(--green)} .stat .value.warn{color:var(--amber)} .stat .value.bad{color:var(--red)}

  /* ---------- Tables ---------- */
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{text-align:left;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;padding:8px 10px;border-bottom:1px solid var(--dim);font-weight:600}
  td{padding:8px 10px;border-bottom:1px solid var(--surface-2)}
  tr:hover td{background:var(--surface-2)}
  .num{font-family:var(--mono);text-align:right}

  .status-pill{display:inline-block;font-size:11px;padding:2px 9px;border-radius:20px;font-family:var(--mono)}
  .s-green{background:rgba(34,197,94,.15);color:var(--green)}
  .s-amber{background:rgba(245,158,11,.15);color:var(--amber)}
  .s-red{background:rgba(239,68,68,.15);color:var(--red)}
  .s-dim{background:var(--surface-2);color:var(--muted)}

  .btn{background:var(--surface-2);color:var(--text);border:1px solid var(--dim);border-radius:8px;padding:7px 13px;font-size:13px}
  .btn:hover:not(:disabled){border-color:var(--faint)}
  .btn-primary{background:var(--blue);color:#06121f;border-color:var(--blue);font-weight:600}
  .btn-danger{background:var(--red);color:#fff;border-color:var(--red)}
  .btn-ghost{background:none}
  .btn-sm{padding:4px 9px;font-size:12px}
  .btn-row{display:flex;gap:6px;flex-wrap:wrap}

  .empty{color:var(--faint);font-size:13px;padding:20px;text-align:center}
  .err-inline{color:var(--red);font-size:12px;padding:10px;border:1px dashed rgba(239,68,68,.4);border-radius:8px}
  .muted{color:var(--muted)} .faint{color:var(--faint)}
  .dev-banner{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.35);color:var(--amber);padding:8px 14px;border-radius:8px;font-size:12px;margin-bottom:16px}

  /* ---------- Pagination ---------- */
  .pager{display:flex;align-items:center;gap:8px;margin-top:12px;flex-wrap:wrap}
  .pager .range{font-size:12px;color:var(--faint);font-family:var(--mono)}
  .pager .spacer{flex:1}
  .pager button{background:var(--surface-2);color:var(--text);border:1px solid var(--dim);border-radius:7px;padding:3px 9px;font-size:12px;font-family:var(--mono);min-width:30px}
  .pager button.cur{background:var(--blue);color:#06121f;border-color:var(--blue);font-weight:600}
  .pager button:disabled{opacity:.4;cursor:not-allowed}
  .pager select{background:var(--surface-2);color:var(--text);border:1px solid var(--dim);border-radius:7px;padding:3px 6px;font-size:12px;font-family:var(--mono)}

  /* ---------- Hierarchy (categories → channels) ---------- */
  .cat-card{background:var(--surface);border:1px solid var(--dim);border-radius:var(--radius);margin-bottom:16px;overflow:hidden}
  .cat-head{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--surface-2);border-bottom:1px solid var(--dim);flex-wrap:wrap}
  .cat-head .title{font-weight:600;font-size:14px}
  .cat-head .meta{font-size:11px;color:var(--faint);font-family:var(--mono)}
  .cat-head .spacer{flex:1}
  .cat-body{padding:14px 16px}
  .chip{display:inline-block;font-size:11px;font-family:var(--mono);padding:2px 8px;border-radius:6px;background:var(--surface-2);border:1px solid var(--dim);color:var(--muted);margin:0 4px 4px 0}
  .chan-sub{margin-top:10px}
  .tree-line{color:var(--faint);font-family:var(--mono)}

  /* ---------- Setup / toast ---------- */
  .center-screen{display:flex;align-items:center;justify-content:center;height:100vh;padding:20px}
  .setup-card{background:var(--surface);border:1px solid var(--dim);border-radius:var(--radius);padding:28px;width:420px;max-width:100%}
  .setup-card h2{margin:0 0 4px;font-size:18px}
  .setup-card p{margin:0 0 18px;color:var(--muted);font-size:13px}
  .form-group{margin-bottom:14px}
  .form-label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px}
  .form-input{width:100%;background:var(--surface-2);border:1px solid var(--dim);border-radius:8px;padding:9px 11px;color:var(--text);font-size:13px;font-family:var(--mono)}
  textarea.form-input{resize:vertical;min-height:64px;line-height:1.5}
  select.form-input{font-family:var(--font)}
  .form-help{font-size:11px;color:var(--faint);margin-top:4px}
  .toast-wrap{position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;gap:8px;z-index:9999}
  .toast{background:var(--surface-2);border:1px solid var(--dim);border-radius:8px;padding:10px 16px;font-size:13px;box-shadow:0 6px 24px rgba(0,0,0,.4)}
  .toast.ok{border-color:rgba(34,197,94,.5)} .toast.err{border-color:rgba(239,68,68,.5)}
  .spinner{color:var(--muted);font-size:13px;padding:30px;text-align:center}

  /* ---------- Modal / forms ---------- */
  .modal-root{position:fixed;inset:0;z-index:9000;display:none}
  .modal-root.open{display:block}
  .modal-overlay{position:absolute;inset:0;background:rgba(0,0,0,.55)}
  .modal{position:absolute;top:0;right:0;height:100vh;width:560px;max-width:100%;background:var(--surface);
         border-left:1px solid var(--dim);display:flex;flex-direction:column;box-shadow:-8px 0 40px rgba(0,0,0,.5)}
  .modal.wide{width:720px}
  .modal-header{flex:0 0 auto;display:flex;align-items:center;gap:10px;padding:16px 20px;border-bottom:1px solid var(--dim)}
  .modal-header h2{margin:0;font-size:15px}
  .modal-header .sub{font-size:11px;color:var(--faint);font-family:var(--mono)}
  .modal-header .x{margin-left:auto;background:none;border:none;color:var(--muted);font-size:20px;line-height:1;padding:4px 8px}
  .modal-body{flex:1;overflow:auto;padding:18px 20px}
  .modal-footer{flex:0 0 auto;display:flex;gap:10px;justify-content:flex-end;padding:14px 20px;border-top:1px solid var(--dim)}
  .fsection{margin-bottom:18px}
  .fsection-title{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--blue);margin:0 0 10px;border-bottom:1px solid var(--surface-2);padding-bottom:6px}
  .fgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  @media(max-width:560px){.fgrid{grid-template-columns:1fr}}
  .ffull{grid-column:1 / -1}
  .ftoggle{display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--surface-2);border:1px solid var(--dim);border-radius:8px;padding:9px 11px}
  .ftoggle .fl{font-size:13px}
  .ro-value{background:var(--surface-2);border:1px solid var(--dim);border-radius:8px;padding:9px 11px;color:var(--muted);font-size:13px;font-family:var(--mono);word-break:break-all}
  /* switch */
  .switch{position:relative;display:inline-block;width:42px;height:23px;flex:0 0 auto}
  .switch input{opacity:0;width:0;height:0}
  .switch .track{position:absolute;inset:0;background:var(--dim);border-radius:20px;transition:.15s}
  .switch .track:before{content:'';position:absolute;height:17px;width:17px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.15s}
  .switch input:checked + .track{background:var(--green)}
  .switch input:checked + .track:before{transform:translateX(19px)}
  .switch input:disabled + .track{opacity:.45;cursor:not-allowed}
</style>
</head>
<body>

<!-- ============ SETUP SCREEN ============ -->
<div id="setup-screen" class="center-screen">
  <div class="setup-card">
    <h2>Content Curator</h2>
    <p>Connect to your Worker API. The secret is stored only in this browser.</p>
    <div class="form-group">
      <label class="form-label">API URL</label>
      <input class="form-input" id="setup-url" placeholder="https://content-curator.YOUR_ACCOUNT.workers.dev">
    </div>
    <div class="form-group">
      <label class="form-label">Internal API Secret</label>
      <input class="form-input" id="setup-secret" type="password" placeholder="your-internal-api-secret">
    </div>
    <button class="btn btn-primary" style="width:100%" onclick="setupConnect()">Connect</button>
    <div id="setup-err" style="margin-top:12px;font-size:13px;color:var(--red);text-align:center"></div>
  </div>
</div>

<!-- ============ APP ============ -->
<div class="app" id="app">
  <div class="layout">
    <!-- Sidebar (independently fixed) -->
    <nav class="sidebar">
      <div>
        <div class="brand">Content Curator<small>Operations Console</small></div>
        <div class="env-pill" id="env-pill">connecting…</div>
      </div>

      <div class="nav-group" id="nav-admin"></div>

      <div class="dev-zone">
        <div class="nav-group" id="nav-dev"></div>
        <button class="nav-item" style="color:var(--faint)" onclick="logout()">
          <span class="ico">⏻</span><span>Sign out</span>
        </button>
      </div>
    </nav>

    <!-- Main -->
    <div class="main">
      <div class="topbar">
        <span class="page-title" id="page-title">Overview</span>
        <span class="spacer"></span>
        <select class="win-select" id="scope-category" title="Category scope" onchange="onScopeCategoryChange()"></select>
        <select class="win-select" id="scope-channel" title="Channel (language) scope" onchange="onScopeChannelChange()"></select>
        <select class="win-select" id="window-select" onchange="onWindowChange()">
          <option value="24">24h</option>
          <option value="48">48h</option>
          <option value="72">72h</option>
        </select>
        <span class="pill" id="pill-curation">curation —</span>
        <span class="pill" id="pill-publish">publish —</span>
        <span class="pill" id="pill-scheduler">scheduler —</span>
      </div>
      <div class="content" id="content"><div class="spinner">Loading…</div></div>
    </div>
  </div>
</div>

<!-- Modal host (edit/create forms) -->
<div class="modal-root" id="modal-root"></div>

<div class="toast-wrap" id="toast-wrap"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="config.js"></script>
<script>
/* =========================================================================
   STRINGS — single source for UI text (English). Future i18n hooks here.
   ========================================================================= */
const T = {
  overview:'Overview', pipeline:'Pipeline Health', sources:'Sources',
  queue:'Queue', content:'Content', cost:'Cost', settings:'Settings',
  logs:'Logs & Events', runs:'Rotation Runs', rawTracker:'Raw Item Tracker',
  debug:'Debug Tools', structure:'Categories & Channels', changelog:'Change Log',
};

/* =========================================================================
   NAV MODEL — the dashboard is organised around the core hierarchy:
   a CATEGORY is the parent entity; its CHANNELS are the children, and in
   practice each channel is a language version of that category (e.g. the
   Crypto category with Persian, Arabic, English… channels).

   • "Structure" group  → the live category→channel tree (primary navigation).
   • "Analytics" group   → cross-cutting views, all scoped by the category /
                            channel selected in the top bar.
   • "Developer" group   → verbose logs / raw tracking / debug.
   ========================================================================= */
const ADMIN_PAGES = [
  { id:'structure', label:T.structure, ico:'⌂' },
  { id:'monitoring', label:'Monitoring', ico:'📈' },
  { id:'overview', label:T.overview, ico:'◎' },
  { id:'pipeline', label:T.pipeline, ico:'⚗' },
  { id:'sources',  label:T.sources,  ico:'⊞' },
  { id:'queue',    label:T.queue,    ico:'≣', badge:'queue' },
  { id:'content',  label:T.content,  ico:'▦' },
  { id:'cost',     label:T.cost,     ico:'$' },
  { id:'settings', label:T.settings, ico:'⚙' },
  { id:'changelog',label:T.changelog,ico:'⟳' },
];
const DEV_PAGES = [
  { id:'runs',       label:T.runs,       ico:'↻' },
  { id:'logs',       label:T.logs,       ico:'≡' },
  { id:'tracker',    label:T.rawTracker, ico:'⊡' },
  { id:'debug',      label:T.debug,      ico:'⌗' },
];

/* Which analytics pages honour the category / channel scope. */
const CATEGORY_SCOPED_PAGES = ['pipeline','sources','queue','content','cost'];
const CHANNEL_SCOPED_PAGES  = ['queue'];

/* Human-readable language names — channels are language versions of a category. */
const LANG_NAMES = { fa:'Persian', ar:'Arabic', en:'English', ru:'Russian', tr:'Turkish',
  fr:'French', de:'German', es:'Spanish', hi:'Hindi', ur:'Urdu', zh:'Chinese', ja:'Japanese' };
function langName(code){ return LANG_NAMES[String(code||'').toLowerCase()] || (code||'—'); }

let CURRENT_PAGE = 'structure';
let WINDOW_HOURS = 24;
let MONITOR_BUCKET = 'day';
let POLL_TIMER = null;

/* Global scope: which category and (optionally) which channel/language the
   analytics views are looking at. Empty = all. */
const SCOPE = { categoryId:'', channelId:'' };
/* Live structure used by the sidebar tree + scope selectors. */
const STRUCT = { categories:[], channelsByCat:{}, expanded:{} };

/* =========================================================================
   API LAYER — single resilient fetch helper.
   ========================================================================= */
function getApiUrl(){ return localStorage.getItem('curator_api_url') || window.CURATOR_API_URL || ''; }
function getSecret(){ return localStorage.getItem('curator_secret') || ''; }

async function api(path, opts = {}){
  const { method='GET', body } = opts;
  const res = await fetch(getApiUrl() + path, {
    method,
    headers: { 'content-type':'application/json', 'x-internal-api-secret':getSecret() },
    body: body ? JSON.stringify(body) : undefined,
  });
  if (res.status === 401){ logout(); throw new Error('unauthorized'); }
  if (!res.ok){
    // Surface backend validation messages where present.
    let detail = '';
    try { const j = await res.clone().json(); detail = j && (j.error || j.message) ? (' — '+(j.error||j.message)) : ''; } catch(_){}
    throw new Error(path + ' → HTTP ' + res.status + detail);
  }
  const ct = res.headers.get('content-type') || '';
  return ct.includes('application/json') ? res.json() : res.text();
}

/* Safe card renderer: isolate failures so one bad endpoint doesn't blank page */
async function safeCard(el, loader){
  try { return await loader(); }
  catch(e){ el.innerHTML = '<div class="err-inline">Failed to load: '+escapeHtml(e.message)+'</div>'; }
}

/* Authoritative runtime state (single source for pills + toggles, so the
   visual state always matches the real system state). */
async function fetchRuntime(){
  const s = await api('/internal/stats');
  return s.runtime_config || {};
}

/* =========================================================================
   UTIL
   ========================================================================= */
function escapeHtml(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmtNum(n){ return (n==null||isNaN(n))?'—':new Intl.NumberFormat('en-US').format(n); }
function fmtPct(n){ return (n==null||isNaN(n))?'—':n.toFixed(1)+'%'; }
function fmtUtc(iso){ if(!iso) return '—'; try{ return new Intl.DateTimeFormat('en-US',{dateStyle:'short',timeStyle:'short',timeZone:'UTC'}).format(new Date(iso))+' UTC'; }catch{ return String(iso);} }
function el(id){ return document.getElementById(id); }
function toast(msg,type='ok'){ const w=el('toast-wrap'); const t=document.createElement('div'); t.className='toast '+type; t.textContent=msg; w.appendChild(t); setTimeout(()=>t.remove(),3600); }
function isOn(v){ return v===true || v==='true' || v===1 || v==='1'; }
function enc(s){ return encodeURIComponent(s); }

/* In-flight guard: disable a button while its async action runs, so the same
   action can't be fired twice and the UI reflects that it is working. */
async function withBtn(btn, fn){
  if(!btn) return fn();
  const label = btn.textContent, wasDisabled = btn.disabled;
  btn.disabled = true; btn.textContent = '…';
  try { return await fn(); }
  finally { btn.disabled = wasDisabled; btn.textContent = label; }
}

function statCard(label,value,opts={}){
  const cls = opts.tone? ' '+opts.tone : '';
  return '<div class="stat"><div class="label">'+escapeHtml(label)+'</div>'+
    '<div class="value'+cls+'">'+escapeHtml(value)+'</div>'+
    (opts.sub? '<div class="sub">'+escapeHtml(opts.sub)+'</div>':'')+'</div>';
}
function pill(text,status){ return '<span class="status-pill s-'+status+'">'+escapeHtml(text)+'</span>'; }

/* =========================================================================
   PAGINATION — generic, reusable. Tables register their full row set and we
   render only the current page slice plus a pager. State is module-level so
   it survives the 45s poll re-render. Pager interaction is handled via event
   delegation on #content (attached once), so it keeps working after innerHTML
   is replaced.
   ========================================================================= */
const TABLE_REG = {};               // key -> { head, rows[], empty, note, title }
const PAGER = {};                   // key -> { page, pageSize }
const PAGE_SIZE_OPTIONS = [10, 25, 50, 100];

function registerTable(key, cfg){
  TABLE_REG[key] = cfg;
  if(!PAGER[key]) PAGER[key] = { page:1, pageSize: cfg.pageSize || 10 };
}
function tableCard(key, cfg){
  registerTable(key, cfg);
  return '<div class="card" data-table="'+escapeHtml(key)+'">'+tableInner(key)+'</div>';
}
function tableInner(key){
  const cfg = TABLE_REG[key], st = PAGER[key];
  const cols = cfg.head.length;
  const total = cfg.rows.length;
  const pages = Math.max(1, Math.ceil(total / st.pageSize));
  if(st.page > pages) st.page = pages;
  if(st.page < 1) st.page = 1;
  const start = (st.page - 1) * st.pageSize;
  const slice = cfg.rows.slice(start, start + st.pageSize);
  const bodyRows = slice.length
    ? slice.join('')
    : '<tr><td colspan="'+cols+'" class="empty">'+escapeHtml(cfg.empty||'No data.')+'</td></tr>';
  const thead = '<thead><tr>'+cfg.head.map(h=>'<th'+(h.cls?' class="'+h.cls+'"':'')+'>'+escapeHtml(h.label)+'</th>').join('')+'</tr></thead>';
  return (cfg.title ? '<h3>'+cfg.title+'</h3>' : '') +
    '<table>'+thead+'<tbody>'+bodyRows+'</tbody></table>' +
    pagerHtml(key, total, pages, start, slice.length) +
    (cfg.note ? '<p class="faint" style="margin-top:8px">'+cfg.note+'</p>' : '');
}
function pagerHtml(key, total, pages, start, shown){
  const st = PAGER[key];
  if(total === 0) return '';
  const from = total ? start + 1 : 0;
  const to = start + shown;
  // Compact numeric window around the current page.
  const win = [];
  const span = 2;
  let lo = Math.max(1, st.page - span), hi = Math.min(pages, st.page + span);
  if(st.page <= span) hi = Math.min(pages, 1 + span*2);
  if(st.page > pages - span) lo = Math.max(1, pages - span*2);
  for(let p=lo; p<=hi; p++) win.push(p);
  const btn = (label, page, opts={}) =>
    '<button data-pager data-key="'+escapeHtml(key)+'" data-page="'+page+'"'+
    (opts.disabled?' disabled':'')+(opts.cur?' class="cur"':'')+'>'+label+'</button>';
  const sizeSel = '<select data-size data-key="'+escapeHtml(key)+'" title="Rows per page">'+
    PAGE_SIZE_OPTIONS.map(n=>'<option value="'+n+'"'+(n===st.pageSize?' selected':'')+'>'+n+' / page</option>').join('')+
    '</select>';
  const nums = win.map(p=>btn(String(p), p, {cur:p===st.page})).join('');
  return '<div class="pager">'+
    '<span class="range">'+from+'–'+to+' of '+fmtNum(total)+'</span>'+
    '<span class="spacer"></span>'+sizeSel+
    btn('‹', Math.max(1, st.page-1), {disabled: st.page<=1})+
    nums+
    btn('›', Math.min(pages, st.page+1), {disabled: st.page>=pages})+
  '</div>';
}
function rerenderTable(key){
  // Search the whole document so paginated tables work inside the content
  // area AND inside the modal/drawer.
  const card = document.querySelector('[data-table="'+CSS.escape(key)+'"]');
  if(card) card.innerHTML = tableInner(key);
}
function wireTableDelegation(root){
  root.addEventListener('click', e=>{
    const b = e.target.closest('button[data-pager]');
    if(!b || b.disabled) return;
    const key = b.getAttribute('data-key');
    if(!PAGER[key]) return;
    PAGER[key].page = parseInt(b.getAttribute('data-page'),10) || 1;
    rerenderTable(key);
  });
  root.addEventListener('change', e=>{
    const s = e.target.closest('select[data-size]');
    if(!s) return;
    const key = s.getAttribute('data-key');
    if(!PAGER[key]) return;
    PAGER[key].pageSize = parseInt(s.value,10) || 10;
    PAGER[key].page = 1;
    rerenderTable(key);
  });
}

   CHANGE LOG — client-side traceability of every create/update/toggle made
   through the dashboard, persisted in localStorage. Gives observability and
   an audit trail of modifications at category & channel level over time.
   ========================================================================= */
const CHANGELOG_KEY = 'curator_changelog';
const CHANGELOG_MAX = 300;
function loadChangelog(){ try{ return JSON.parse(localStorage.getItem(CHANGELOG_KEY) || '[]'); }catch{ return []; } }
function saveChangelog(list){ try{ localStorage.setItem(CHANGELOG_KEY, JSON.stringify(list.slice(0, CHANGELOG_MAX))); }catch(_){} }
function getOperator(){ return localStorage.getItem('curator_operator') || ''; }
function setOperator(){
  const cur = getOperator();
  const v = prompt('Operator name (recorded as "who" on each change you make):', cur);
  if(v===null) return;
  localStorage.setItem('curator_operator', v.trim());
  toast('Operator set to '+(v.trim()||'(none)'));
  if(CURRENT_PAGE==='changelog') loadPage('changelog');
}
function logChange(entity, id, action, changes){
  const list = loadChangelog();
  list.unshift({ ts:new Date().toISOString(), who:getOperator()||'—', entity, id, action, changes: changes||[] });
  saveChangelog(list);
}
function clearChangelog(){
  if(!confirm('Clear the entire local change log? This cannot be undone.')) return;
  saveChangelog([]); if(CURRENT_PAGE==='changelog') loadPage('changelog'); toast('Change log cleared');
}
/* Build a field-level diff between the original row and the submitted body. */
function diffFields(original, body, fields){
  const out = [];
  fields.forEach(f=>{
    if(!(f.key in body)) return;
    const oldRaw = original ? original[f.key] : undefined;
    const nv = body[f.key];
    const a = normForDiff(oldRaw, f), b = normForDiff(nv, f);
    if(a !== b) out.push({ field:f.key, from:a, to:b });
  });
  return out;
}
function normForDiff(v, f){
  if(v===undefined || v===null) return '∅';
  if(f && f.type==='toggle') return isOn(v) ? 'on' : 'off';
  if(Array.isArray(v)) return v.join(', ');
  return String(v).slice(0, 120);
}

/* =========================================================================
   SCOPE & STRUCTURE — category→channel hierarchy that drives navigation and
   scopes every category/channel-aware analytics view.
   ========================================================================= */
async function loadStructure(){
  try{
    const [catRes, chanRes] = await Promise.all([
      api('/internal/categories').catch(()=>({categories:[]})),
      api('/internal/channels').catch(()=>({channels:[]})),
    ]);
    STRUCT.categories = catRes.categories || [];
    STRUCT.channelsByCat = {};
    CATEGORIES_CACHE = STRUCT.categories;
    STRUCT_CACHE.categories = {}; STRUCT_CACHE.channels = {};
    STRUCT.categories.forEach(c=>{ STRUCT_CACHE.categories[c.id]=c; });
    (chanRes.channels||[]).forEach(ch=>{
      (STRUCT.channelsByCat[ch.category_id] = STRUCT.channelsByCat[ch.category_id] || []).push(ch);
      STRUCT_CACHE.channels[ch.id]=ch;
    });
    // sort channels by language for stable, readable ordering
    Object.values(STRUCT.channelsByCat).forEach(arr=>arr.sort((a,b)=>String(a.language).localeCompare(String(b.language))));
    // keep the scoped category expanded by default
    if(SCOPE.categoryId) STRUCT.expanded[SCOPE.categoryId] = true;
    else if(STRUCT.categories.length===1) STRUCT.expanded[STRUCT.categories[0].id] = true;
    // drop scope that no longer exists
    if(SCOPE.categoryId && !STRUCT_CACHE.categories[SCOPE.categoryId]) SCOPE.categoryId='';
    if(SCOPE.channelId && !STRUCT_CACHE.channels[SCOPE.channelId]) SCOPE.channelId='';
  }catch(e){ /* non-fatal */ }
  renderScopeSelectors();
}
function setScope(catId, chId){
  SCOPE.categoryId = catId || '';
  SCOPE.channelId = chId || '';
  if(SCOPE.channelId){
    const ch = STRUCT_CACHE.channels[SCOPE.channelId];
    if(ch) SCOPE.categoryId = ch.category_id; // channel implies its category
  }
  renderScopeSelectors();
}
function scopeLabel(){
  if(SCOPE.channelId){ const ch=STRUCT_CACHE.channels[SCOPE.channelId]; return (STRUCT_CACHE.categories[SCOPE.categoryId]?.label||SCOPE.categoryId)+' › '+langName(ch?.language); }
  if(SCOPE.categoryId){ return STRUCT_CACHE.categories[SCOPE.categoryId]?.label || SCOPE.categoryId; }
  return 'All categories';
}
function scopedTitle(base){
  const onScoped = CATEGORY_SCOPED_PAGES.includes(CURRENT_PAGE);
  return onScoped ? base+'  ·  '+scopeLabel() : base;
}
function renderScopeSelectors(){
  const cSel = el('scope-category'); if(!cSel) return;
  cSel.innerHTML = '<option value="">All categories</option>' +
    STRUCT.categories.map(c=>'<option value="'+escapeHtml(c.id)+'"'+(c.id===SCOPE.categoryId?' selected':'')+'>'+escapeHtml(c.label||c.id)+'</option>').join('');
  const chSel = el('scope-channel');
  const chans = SCOPE.categoryId ? (STRUCT.channelsByCat[SCOPE.categoryId]||[]) : [];
  chSel.innerHTML = '<option value="">'+(SCOPE.categoryId?'All channels':'—')+'</option>' +
    chans.map(ch=>'<option value="'+escapeHtml(ch.id)+'"'+(ch.id===SCOPE.channelId?' selected':'')+'>'+escapeHtml(langName(ch.language))+' ('+escapeHtml(ch.language)+')</option>').join('');
  chSel.disabled = !SCOPE.categoryId;
  chSel.style.opacity = SCOPE.categoryId ? '1' : '.5';
}
function onScopeCategoryChange(){
  setScope(el('scope-category').value, '');
  renderNav();
  el('page-title').textContent = scopedTitle(currentPageLabel());

}
function onScopeChannelChange(){
  SCOPE.channelId = el('scope-channel').value || '';

function currentPageLabel(){ const all=[...ADMIN_PAGES,...DEV_PAGES]; return (all.find(p=>p.id===CURRENT_PAGE)||{label:''}).label; }
/* Query-string helpers so analytics endpoints honour the active scope. */
function catParam(joiner){ return SCOPE.categoryId ? (joiner+'category='+enc(SCOPE.categoryId)) : ''; }
/* Resolve the channel(s) the channel-scoped reports should use. If a channel
   is selected use it; otherwise fall back to the first channel of the scoped
   category (these reports are inherently single-channel). */
function scopedChannelId(){
  if(SCOPE.channelId) return SCOPE.channelId;
  if(SCOPE.categoryId){ const list=STRUCT.channelsByCat[SCOPE.categoryId]||[]; return list.length?list[0].id:''; }

/* ---------- Form rendering from schema ---------- */
let CATEGORIES_CACHE = [];
function fieldInputHtml(f, row, isCreate){
  const v = row ? row[f.key] : undefined;
  const readOnly = f.createOnly && !isCreate;
  if(readOnly){
    return labelWrap(f, '<div class="ro-value">'+escapeHtml(v==null?'—':String(v))+'</div>');
  }
  if(f.type==='toggle'){
    const on = (v===undefined) ? !!f.def : isOn(v);
    return '<div class="ftoggle"><span class="fl">'+escapeHtml(f.label)+
      (f.help?'<div class="form-help">'+escapeHtml(f.help)+'</div>':'')+'</span>'+
      '<label class="switch"><input type="checkbox" data-field="'+f.key+'" data-type="toggle"'+(on?' checked':'')+'>'+
      '<span class="track"></span></label></div>';
  }
  let input='';
  if(f.type==='textarea'){
    input = '<textarea class="form-input" data-field="'+f.key+'" data-type="text"'+(f.max?' maxlength="'+f.max+'"':'')+'>'+escapeHtml(v==null?'':v)+'</textarea>';
  } else if(f.type==='select'){
    input = '<select class="form-input" data-field="'+f.key+'" data-type="text">'+
      (f.options||[]).map(o=>'<option value="'+escapeHtml(o)+'"'+((v!=null?String(v):f.def)===o?' selected':'')+'>'+escapeHtml(o)+'</option>').join('')+'</select>';
  } else if(f.type==='catselect'){
    input = '<select class="form-input" data-field="'+f.key+'" data-type="text">'+
      CATEGORIES_CACHE.map(c=>'<option value="'+escapeHtml(c.id)+'"'+((v!=null?String(v):'')===c.id?' selected':'')+'>'+escapeHtml(c.id)+' — '+escapeHtml(c.label||'')+'</option>').join('')+'</select>';
  } else if(f.type==='csv'){
    const text = Array.isArray(v) ? v.join(', ') : csvFromJson(v);
    input = '<textarea class="form-input" data-field="'+f.key+'" data-type="csv" style="min-height:48px">'+escapeHtml(text)+'</textarea>';
  } else if(f.type==='windows'){
    const text = Array.isArray(v) ? v.join(', ') : csvFromJson(v);
    input = '<input class="form-input" data-field="'+f.key+'" data-type="windows" value="'+escapeHtml(text)+'">';
  } else if(f.type==='json'){
    let text = '';
    if(v!=null && v!==''){ try{ text = JSON.stringify(typeof v==='string'?JSON.parse(v):v, null, 2); }catch{ text = String(v); } }
    input = '<textarea class="form-input mono" data-field="'+f.key+'" data-type="json" style="min-height:80px">'+escapeHtml(text)+'</textarea>';
  } else if(f.type==='number'){
    const val = (v===undefined||v===null) ? (f.nullable?'':(f.def!=null?f.def:'')) : v;
    input = '<input class="form-input" type="number" data-field="'+f.key+'" data-type="number" value="'+escapeHtml(val)+'"'+
      (f.min!=null?' min="'+f.min+'"':'')+(f.max!=null?' max="'+f.max+'"':'')+(f.step!=null?' step="'+f.step+'"':'')+'>';
  } else {
    const val = (v==null) ? (f.def!=null && isCreate ? f.def : (v==null?'':v)) : v;
    input = '<input class="form-input" type="text" data-field="'+f.key+'" data-type="text" value="'+escapeHtml(val)+'"'+(f.max?' maxlength="'+f.max+'"':'')+'>';
  }
  return labelWrap(f, input);
}
function labelWrap(f, inner){
  return '<div class="'+(f.full?'ffull':'')+'"><label class="form-label">'+escapeHtml(f.label)+
    (f.required?' <span style="color:var(--red)">*</span>':'')+'</label>'+inner+
    (f.help && f.type!=='toggle'?'<div class="form-help">'+escapeHtml(f.help)+'</div>':'')+'</div>';
}
function csvFromJson(v){
  if(v==null || v==='') return '';
  if(Array.isArray(v)) return v.join(', ');
  try{ const p=JSON.parse(v); return Array.isArray(p)? p.join(', ') : String(v); }catch{ return String(v); }
}
function renderForm(fields, row, isCreate){
  let html=''; let open=false;
  fields.forEach(f=>{
    if(f.section){
      if(open) html+='</div></div>';
      html += '<div class="fsection"><div class="fsection-title">'+escapeHtml(f.section)+'</div><div class="fgrid">';
      open=true; return;
    }
    html += fieldInputHtml(f, row, isCreate);
  });
  if(open) html+='</div></div>';
  return html;
}
function collectForm(fields, isCreate){
  const body = {};
  document.querySelectorAll('#modal-root [data-field]').forEach(node=>{
    const key = node.getAttribute('data-field');
    const type = node.getAttribute('data-type');
    let val;
    if(type==='toggle'){ val = node.checked; }
    else if(type==='number'){ const raw=String(node.value).trim(); val = raw===''? null : Number(raw); }
    else if(type==='csv'){ val = String(node.value).split(/[\n,]/).map(s=>s.trim()).filter(Boolean); }
    else if(type==='windows'){ val = String(node.value).split(',').map(s=>s.trim()).filter(Boolean); }
    else if(type==='json'){ const raw=String(node.value).trim(); if(raw===''){ val=null; } else { try{ val=JSON.parse(raw); }catch{ val=raw; } } }
    else { val = node.value; }
    body[key] = val;
  });
  return body;
}

let MODAL_ONSAVE = null;
function openModal(opts){
  // opts: { title, sub, bodyHtml, saveLabel, onSave, wide }
  MODAL_ONSAVE = opts.onSave || null;
  const root = el('modal-root');
  root.innerHTML =
    '<div class="modal-overlay" onclick="closeModal()"></div>'+
    '<div class="modal'+(opts.wide?' wide':'')+'">'+
      '<div class="modal-header"><div><h2>'+escapeHtml(opts.title||'')+'</h2>'+
        (opts.sub?'<div class="sub">'+escapeHtml(opts.sub)+'</div>':'')+'</div>'+
        '<button class="x" onclick="closeModal()">×</button></div>'+
      '<div class="modal-body">'+(opts.bodyHtml||'')+'</div>'+
      (opts.onSave? '<div class="modal-footer">'+
        '<button class="btn" onclick="closeModal()">Cancel</button>'+
        '<button class="btn btn-primary" onclick="modalSave(this)">'+escapeHtml(opts.saveLabel||'Save')+'</button>'+
      '</div>':'')+

}

/* In-memory cache of the loaded category/channel rows, so editors can diff
   against the original values for the change log. */
const STRUCT_CACHE = { categories:{}, channels:{} };

function flagRow(label,on){
  return '<div style="display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--surface-2)">'+
    '<span class="muted">'+escapeHtml(label)+'</span>'+pill(on?'on':'off', on?'green':'dim')+'</div>';
}
function indexBy(arr,key){ const m={}; (arr||[]).forEach(x=>{ m[x[key]]=x; }); return m; }
function setMonitorBucket(b){ MONITOR_BUCKET=b; loadPage('monitoring'); }

/* =========================================================================
   CATEGORY / CHANNEL EDITORS
   ========================================================================= */
function openCategoryEditor(id){
  const isCreate = !id;
  const row = id ? STRUCT_CACHE.categories[id] : null;
  // Normalise language_targets to an array for the form.
  const rowForForm = row ? Object.assign({}, row, { language_targets: parseJsonArray(row.language_targets) }) : null;
  openModal({
    title: isCreate ? 'New category' : 'Edit category',
    sub: isCreate ? 'Top-level entity' : id,
    wide:true,
    bodyHtml: renderForm(CATEGORY_FIELDS, rowForForm, isCreate),
    saveLabel: isCreate ? 'Create category' : 'Save changes',
    onSave: async ()=>{
      const body = collectForm(CATEGORY_FIELDS, isCreate);
      if(isCreate){
        if(!body.id || !body.label || !body.prompt_profile){ toast('id, label and prompt_profile are required','err'); return; }
      } else {
        delete body.id; // immutable
      }
      const path = isCreate ? '/internal/categories' : '/internal/categories/'+enc(id);
      try{
        await api(path, { method: isCreate?'POST':'PATCH', body });
        const changes = diffFields(row, body, CATEGORY_FIELDS.filter(f=>f.key));
        logChange('category', isCreate?body.id:id, isCreate?'create':'update', isCreate?summarizeCreate(body):changes);
        toast('Category '+(isCreate?'created':'updated'),'ok');
        closeModal();
        if(CURRENT_PAGE==='structure') loadPage('structure');
      }catch(e){ toast(e.message,'err'); }
    },
  });
}

function openChannelEditor(id, presetCategoryId){
  const isCreate = !id;
  const row = id ? STRUCT_CACHE.channels[id] : (presetCategoryId ? { category_id:presetCategoryId } : null);
  const rowForForm = row ? Object.assign({}, row, {
    allowed_windows: parseJsonArray(row.allowed_windows),
    blocked_windows: parseJsonArray(row.blocked_windows),
    forbidden_phrases: parseJsonArray(row.forbidden_phrases),
  }) : null;
  openModal({
    title: isCreate ? 'New channel' : 'Edit channel',
    sub: isCreate ? (presetCategoryId? 'under '+presetCategoryId : 'sub-entity') : id,
    wide:true,
    bodyHtml: renderForm(CHANNEL_FIELDS, rowForForm, isCreate),
    saveLabel: isCreate ? 'Create channel' : 'Save changes',
    onSave: async ()=>{
      const body = collectForm(CHANNEL_FIELDS, isCreate);
      if(isCreate){
        if(!body.id || !body.category_id || !body.telegram_chat_id || !body.language){ toast('id, category, language and telegram chat id are required','err'); return; }
      } else {
        delete body.id; delete body.category_id; // immutable on edit
      }
      const path = isCreate ? '/internal/channels' : '/internal/channels/'+enc(id);
      try{
        await api(path, { method: isCreate?'POST':'PATCH', body });
        const changes = diffFields(id?STRUCT_CACHE.channels[id]:null, body, CHANNEL_FIELDS.filter(f=>f.key));
        logChange('channel', isCreate?body.id:id, isCreate?'create':'update', isCreate?summarizeCreate(body):changes);
        toast('Channel '+(isCreate?'created':'updated'),'ok');
        closeModal();
        if(CURRENT_PAGE==='structure') loadPage('structure');
      }catch(e){ toast(e.message,'err'); }
    },
  });
}
function summarizeCreate(body){
  return Object.keys(body).filter(k=>k!=='id').slice(0,8).map(k=>({field:k, from:'∅', to:normForDiff(body[k],{})}));
}
function parseJsonArray(v){ if(Array.isArray(v)) return v; if(v==null||v==='') return []; try{ const p=JSON.parse(v); return Array.isArray(p)?p:[]; }catch{ return []; } }

/* =========================================================================
   CHANNEL DETAIL DRAWER — the comprehensive, single place to view, edit and
   manage every facet of a channel. It surfaces the full read/edit/display
   surface the codebase exposes for a channel:
     • all 35 stored attributes (grouped, read-only) + Edit / Enable / Publish
     • runtime health: queue-health (category), queue-quality (channel),
       source-cap-preview (channel), gap-fill-preview (channel)
     • the channel's scheduled queue with the REAL Telegram preview, plus
       publish-now / retry / cancel
     • structural elements: source accounts + Apify sources for its category
       (add / enable / disable / edit)
   ========================================================================= */
let DETAIL_CHANNEL_ID = null;
let DETAIL_CTX = null; // { type:'channel'|'category', id, catId }
function reopenDetail(){ if(!DETAIL_CTX) return; if(DETAIL_CTX.type==='channel') openChannelDetail(DETAIL_CTX.id); else openCategoryDetail(DETAIL_CTX.catId); }
let DETAIL_QUEUE_STATUS = 'scheduled';

function channelAttrHtml(ch){
  // Render every stored attribute, grouped exactly like the editor sections.
  let html=''; let open=false, rows='';
  const flush=()=>{ if(open){ html+='<div class="fgrid">'+rows+'</div></div>'; rows=''; } };
  CHANNEL_FIELDS.forEach(f=>{
    if(f.section){ flush(); html+='<div class="fsection"><div class="fsection-title">'+escapeHtml(f.section)+'</div>'; open=true; return; }
    let v = ch[f.key];
    if(f.type==='toggle') v = isOn(v)?'on':'off';
    else if(f.type==='windows'||f.type==='csv') v = parseJsonArray(v).join(', ') || '—';
    else if(v==null||v==='') v='—';
    rows += '<div><label class="form-label">'+escapeHtml(f.label)+'</label>'+
            '<div class="ro-value">'+escapeHtml(String(v))+'</div></div>';
  });
  flush();
  html += '<div class="fsection"><div class="fsection-title">Record</div><div class="fgrid">'+
    '<div><label class="form-label">publish_enabled</label><div class="ro-value">'+(isOn(ch.publish_enabled)?'on':'off')+'</div></div>'+
    '<div><label class="form-label">created_at</label><div class="ro-value">'+escapeHtml(fmtUtc(ch.created_at))+'</div></div>'+
  '</div></div>';
  return html;
}

  try{
    const [qh, qq, cap, gap] = await Promise.all([
      api('/internal/report/queue-health?category='+enc(catId)).catch(()=>({channels:[]})),
      api('/internal/report/queue-quality?channel='+enc(id)).catch(()=>({})),
      api('/internal/report/source-cap-preview?channel='+enc(id)).catch(()=>({rows:[]})),
      api('/internal/report/gap-fill-preview?channel='+enc(id)).catch(()=>({rows:[],movedEarlierCount:0})),
    ]);

        statCard('Queue state', ch.state||'—', {tone:stateTone, sub:ch.backloaded?'backloaded':''})+
        statCard('Scheduled 6h / 24h', fmtNum(ch.scheduledNext6h)+' / '+fmtNum(ch.scheduledNext24h))+
        statCard('Pending candidates', fmtNum(ch.pendingCandidates))+
        statCard('Last publish (min)', ch.lastPublishedAgoMin!=null?fmtNum(ch.lastPublishedAgoMin):'—', {sub:'rotation age '+(ch.rotationAgeMin!=null?fmtNum(ch.rotationAgeMin)+'m':'—')})+
      '</div>'+

        statCard('Unique sources 6h', fmtNum(qq.uniqueSourcesNext6h))+
        statCard('Unique stories 6h', fmtNum(qq.uniqueFingerprintsNext6h))+
        statCard('Max source share 24h', sharePct!=null?sharePct.toFixed(0)+'%':'—', {tone: sharePct>40?'warn':'good', sub: qq.topSourceNext24h||''})+
      '</div>'+
      tableCard('detail-cap',{ title:'Source cap preview <span class="faint">(what would be capped)</span>',

      const en = isOn(a.enabled);
      return '<tr><td><code>'+escapeHtml(a.platform)+'</code></td>'+
        '<td>@'+escapeHtml(a.account_handle)+(a.display_name?' <span class="faint">'+escapeHtml(a.display_name)+'</span>':'')+'</td>'+
        '<td>'+escapeHtml(a.trust_level||'—')+'</td>'+
        '<td>'+pill(en?'enabled':'disabled', en?'green':'dim')+'</td>'+
        '<td>'+(en?'<button class="btn btn-sm btn-danger" onclick="disableSourceAccount(event,\''+escapeHtml(a.id)+'\')">Disable</button>':'<span class="faint">—</span>')+'</td></tr>';
    });
    host.innerHTML = tableCard('detail-srcacc-tbl',{
      head:[{label:'Platform'},{label:'Handle'},{label:'Trust'},{label:'State'},{label:''}],
      rows:rows, empty:'No source accounts for this category.', pageSize:10 });
  }catch(e){ host.innerHTML='<div class="err-inline">'+escapeHtml(e.message)+'</div>'; }
}
async function loadDetailApify(catId){
  const host = el('detail-apify'); if(!host) return;
  try{
    const res = await api('/internal/apify-sources').catch(()=>({sources:[]}));
    const list = (res.sources||[]).filter(s=>s.category_id===catId);
    list.forEach(s=>{ APIFY_CACHE[s.id]=s; });
    const rows = list.map(s=>{
      const en = isOn(s.enabled);
      return '<tr><td><code>'+escapeHtml(s.id)+'</code></td>'+
        '<td><code>'+escapeHtml(s.platform)+'</code></td>'+
        '<td>'+escapeHtml(s.label||'—')+'</td>'+
        '<td><code>'+escapeHtml(String(s.apify_dataset_id||'—').slice(0,18))+'</code></td>'+
        '<td>'+pill(en?'enabled':'disabled', en?'green':'dim')+'</td>'+
        '<td><div class="btn-row">'+
          '<button class="btn btn-sm" onclick="openApifySourceEditor(\''+escapeHtml(s.id)+'\',\''+escapeHtml(catId)+'\')">Edit</button>'+
          '<button class="btn btn-sm" onclick="toggleApifySource(event,\''+escapeHtml(s.id)+'\','+(!en)+')">'+(en?'Disable':'Enable')+'</button>'+
          '<button class="btn btn-sm btn-danger" onclick="deleteApifySource(event,\''+escapeHtml(s.id)+'\')">Delete</button>'+
        '</div></td></tr>';
    });
    host.innerHTML = tableCard('detail-apify-tbl',{
      head:[{label:'ID'},{label:'Platform'},{label:'Label'},{label:'Dataset'},{label:'State'},{label:'Actions'}],
      rows:rows, empty:'No Apify sources for this category.', pageSize:10 });
  }catch(e){ host.innerHTML='<div class="err-inline">'+escapeHtml(e.message)+'</div>'; }
}
function refreshDetailSources(){
  if(!DETAIL_CTX) return;
  loadDetailSourceAccounts(DETAIL_CTX.catId); loadDetailApify(DETAIL_CTX.catId);
}

function openSourceAccountEditor(catId){
  openModal({ title:'New source account', sub:'category '+catId, wide:true,
    bodyHtml: renderForm(SOURCE_ACCOUNT_FIELDS, { category_id:catId }, true),
    saveLabel:'Create', onSave: async ()=>{
      const body = collectForm(SOURCE_ACCOUNT_FIELDS, true);
      if(!body.category_id || !body.platform || !body.account_handle){ toast('category, platform and handle are required','err'); return; }
      try{ await api('/internal/source-accounts', {method:'POST', body});
        logChange('source_account', body.account_handle, 'create', summarizeCreate(body));
        toast('Source account created','ok'); closeModal(); reopenDetail();
      }catch(e){ toast(e.message,'err'); }
    } });
}
async function disableSourceAccount(ev, id){
  if(!confirm('Disable this source account?')) return;
  await withBtn(ev&&ev.currentTarget, async ()=>{
    try{ await api('/internal/source-accounts/'+enc(id), {method:'DELETE'});
      logChange('source_account', id, 'update', [{field:'enabled', from:'on', to:'off'}]);
      toast('Disabled','ok'); refreshDetailSources();
    }catch(e){ toast(e.message,'err'); }
  });
}
let APIFY_CACHE = {};
function openApifySourceEditor(id, catId){
  const isCreate = !id;
  // pull current row from the last-rendered list cache
  const row = id ? APIFY_CACHE[id] : { category_id:catId };
  openModal({ title:isCreate?'New Apify source':'Edit Apify source', sub:id||('category '+catId), wide:true,
    bodyHtml: renderForm(APIFY_SOURCE_FIELDS, row, isCreate),
    saveLabel:isCreate?'Create':'Save changes', onSave: async ()=>{
      const body = collectForm(APIFY_SOURCE_FIELDS, isCreate);
      if(isCreate){ if(!body.id||!body.platform||!body.apify_dataset_id){ toast('id, platform and dataset id are required','err'); return; } }
      else { delete body.id; }
      const path = isCreate ? '/internal/apify-sources' : '/internal/apify-sources/'+enc(id);
      try{ await api(path, {method:isCreate?'POST':'PATCH', body});
        logChange('apify_source', isCreate?body.id:id, isCreate?'create':'update', isCreate?summarizeCreate(body):diffFields(row, body, APIFY_SOURCE_FIELDS.filter(f=>f.key)));
        toast('Apify source '+(isCreate?'created':'updated'),'ok'); closeModal(); reopenDetail();
      }catch(e){ toast(e.message,'err'); }
    } });
}
async function toggleApifySource(ev, id, enable){
  await withBtn(ev&&ev.currentTarget, async ()=>{
    try{ await api('/internal/apify-sources/'+enc(id), {method:'PATCH', body:{enabled:enable}});
      logChange('apify_source', id, 'update', [{field:'enabled', from:(!enable?'on':'off'), to:(enable?'on':'off')}]);
      toast((enable?'Enabled':'Disabled')+' '+id,'ok'); refreshDetailSources();
    }catch(e){ toast(e.message,'err'); }
  });
}
async function deleteApifySource(ev, id){
  if(!confirm('Permanently delete Apify source '+id+'? This cannot be undone.')) return;
  await withBtn(ev&&ev.currentTarget, async ()=>{
    try{ await api('/internal/apify-sources/'+enc(id), {method:'DELETE'});
      logChange('apify_source', id, 'delete', []);
      toast('Deleted '+id,'ok'); refreshDetailSources();
    }catch(e){ toast(e.message,'err'); }
  });
}

/* ---------- Enable/disable & publish actions (correct dependent state) ---------- */
async function toggleCategoryEnabled(ev, id, enable){
  const btn = ev && ev.currentTarget;
  if(!enable && !confirm('Disable category '+id+'?\n\nIts pipeline stops; channels under it will not receive new posts.')) return;
  await withBtn(btn, async ()=>{
    try{
      await api('/internal/categories/'+enc(id), { method:'PATCH', body:{ enabled: enable } });
      logChange('category', id, 'update', [{field:'enabled', from:(!enable?'on':'off'), to:(enable?'on':'off')}]);
      toast('Category '+(enable?'enabled':'disabled'),'ok');
      if(CURRENT_PAGE==='structure') loadPage('structure');
    }catch(e){ toast(e.message,'err'); }
  });
}
async function toggleChannelEnabled(ev, id, enable){
  const btn = ev && ev.currentTarget;
  if(!enable && !confirm('Disable channel '+id+'?\n\nIt stops being active and cannot publish until re-enabled.')) return;
  await withBtn(btn, async ()=>{
    try{
      await api('/internal/channels/'+enc(id), { method:'PATCH', body:{ enabled: enable } });
      logChange('channel', id, 'update', [{field:'enabled', from:(!enable?'on':'off'), to:(enable?'on':'off')}]);
      toast('Channel '+(enable?'enabled':'disabled'),'ok');
      if(CURRENT_PAGE==='structure') loadPage('structure');
    }catch(e){ toast(e.message,'err'); }
  });
}
async function toggleChannelPublish(ev, id, enable, channelEnabled){
  // Dependent state: publishing has no effect unless the master switch is on.
  if(enable && !channelEnabled){ toast('Enable the channel before turning on publishing.','err'); return; }
  const btn = ev && ev.currentTarget;
  if(enable && !confirm('Start LIVE publishing for channel '+id+'?\n\nThis affects the live channel. Continue?')) return;
  await withBtn(btn, async ()=>{
    try{
      await api('/internal/channels/'+enc(id)+'/publish', { method:'POST', body:{ enabled: enable } });
      logChange('channel', id, 'update', [{field:'publish_enabled', from:(!enable?'on':'off'), to:(enable?'on':'off')}]);
      toast('Publishing '+(enable?'enabled':'paused')+' for '+id,'ok');
      if(CURRENT_PAGE==='structure') loadPage('structure');
    }catch(e){ toast(e.message,'err'); }
  });
}

/* ---------- Source / settings actions ---------- */
async function toggleSource(ev, id, enable){
  const btn = ev && ev.currentTarget;
  if(!enable && !confirm('Disable source '+id+'?\n\nIt will stop being scraped until re-enabled.')) return;
  await withBtn(btn, async ()=>{
    try{
      await api('/internal/apify-sources/'+enc(id), {method:'PATCH', body:{enabled:enable}});
      logChange('source', id, 'update', [{field:'enabled', from:(!enable?'on':'off'), to:(enable?'on':'off')}]);
      toast((enable?'Enabled ':'Disabled ')+id,'ok');
      loadPage('sources');
    }catch(e){ toast('Toggle failed: '+e.message,'err'); }
  });
}
async function toggleSetting(ev, key, enable){
  const btn = ev && ev.currentTarget;
  const HIGH_IMPACT = { telegram_publish_enabled:'live Telegram publishing', maintenance_mode:'maintenance mode' };
  if(HIGH_IMPACT[key]){
    const verb = enable?'ENABLE':'DISABLE';
    if(!confirm(verb+' '+HIGH_IMPACT[key]+'?\n\nThis affects the live channel. Continue?')) return;
  }
  await withBtn(btn, async ()=>{
    try{
      await api('/internal/admin/toggle', {method:'POST', body:{key, value:String(enable)}});
      logChange('setting', key, 'update', [{field:key, from:(!enable?'on':'off'), to:(enable?'on':'off')}]);
      toast(key+' → '+(enable?'on':'off'),'ok');
      loadPills();
      loadPage('settings');
    }catch(e){ toast('Toggle failed: '+e.message,'err'); }
  });
}
async function triggerCuration(ev){
  const btn = ev && ev.currentTarget;
  await withBtn(btn, async ()=>{
    try{ await api('/internal/curation/trigger', {method:'POST', body:{}}); toast('Curation triggered','ok'); setTimeout(()=>loadPage('runs'),1500); }
    catch(e){ toast('Trigger failed: '+e.message,'err'); }
  });
}
async function drainBacklog(ev){
  const btn = ev && ev.currentTarget;
  await withBtn(btn, async ()=>{
    try{ await api('/internal/backlog/drain', {method:'POST', body:{}}); toast('Drain done','ok'); loadPage('logs'); }
    catch(e){ toast('Drain failed: '+e.message,'err'); }
  });
}
let TRACKER_STATUS = 'ai_rejected';
function setTrackerStatus(s){ TRACKER_STATUS = s; loadPage('tracker'); }

/* =========================================================================
   TOPBAR PILLS — sourced from the authoritative runtime_config so the
   displayed enable/disable state always matches the real system state.
   ========================================================================= */
async function loadPills(){
  try{
    const rc = await fetchRuntime();
    setPill('pill-curation','curation', isOn(rc.curation_enabled));
    setPill('pill-publish','publish', isOn(rc.telegram_publish_enabled));
    setPill('pill-scheduler','scheduler', isOn(rc.telegram_scheduler_enabled));
  }catch(e){ /* pills are non-critical */ }
}
function setPill(id,label,on){ const p=el(id); if(!p) return; p.textContent=label+' '+(on?'on':'off'); p.className='pill '+(on?'on':'off'); }

/* =========================================================================
   POLLING
   ========================================================================= */
function startPolling(){
  if(POLL_TIMER) clearInterval(POLL_TIMER);
  POLL_TIMER = setInterval(()=>{
    if(document.hidden) return;
    if(el('modal-root').classList.contains('open')) return; // don't yank an open editor
    loadPills();
    if(!DEV_PAGE_IDS.includes(CURRENT_PAGE)) loadPage(CURRENT_PAGE);
  }, 45000);
}
document.addEventListener('visibilitychange',()=>{ if(!document.hidden){ loadPills(); } });
function onWindowChange(){ WINDOW_HOURS = parseInt(el('window-select').value,10)||24; loadPage(CURRENT_PAGE); }

/* =========================================================================
   BOOT
   ========================================================================= */
async function boot(){
  el('setup-screen').style.display='none';
  el('app').style.display='block';
  renderNav();
  wireTableDelegation(el('content'));
  wireTableDelegation(el('modal-root'));
  try{
    const h = await api('/health');
    el('env-pill').textContent = (h.environment || h.env || 'connected');
  }catch(e){
    el('env-pill').textContent='connection error';
    toast('Cannot reach API. Check URL/secret.','err');
  }
  loadPills();
  await loadStructure();   // build the category→channel tree + scope selectors
  renderNav();
  nav('structure');        // land on the hierarchy — the core of the dashboard
  startPolling();
}

(function init(){
  const url=getApiUrl(), secret=getSecret();
  if(url){ el('setup-url').value=url; }
  if(url && secret){ boot(); }
  else { el('setup-screen').style.display='flex'; }
})();
</script>
</body>
