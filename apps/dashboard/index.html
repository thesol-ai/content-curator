<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Content Curator — Control</title>
<style>
  :root{
    --bg:#0c0c0e; --surface:#151518; --surface-2:#1b1b20; --dim:#2e2e35;
    --text:#e6e6ea; --muted:#8a8a98; --faint:#5a5a68;
    --green:#22c55e; --red:#ef4444; --amber:#f59e0b; --blue:#60a5fa;
    --purple:#a78bfa; --cyan:#22d3ee;
    --radius:10px; --gap:16px;
    --font:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
    --mono:'JetBrains Mono','Fira Code',ui-monospace,monospace;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;line-height:1.5}
  a{color:var(--blue);text-decoration:none}
  button{font-family:inherit;cursor:pointer}
  code,.mono{font-family:var(--mono)}

  /* ---------- App shell ---------- */
  .app{display:none;min-height:100vh}
  .layout{display:grid;grid-template-columns:230px 1fr;min-height:100vh}
  .sidebar{background:var(--surface);border-right:1px solid var(--dim);padding:18px 12px;display:flex;flex-direction:column;gap:6px}
  .brand{font-weight:700;font-size:15px;padding:6px 10px 2px}
  .brand small{display:block;font-weight:400;font-size:11px;color:var(--muted);margin-top:3px}
  .env-pill{font-family:var(--mono);font-size:11px;color:var(--cyan);padding:2px 10px 14px}

  .nav-group{margin-top:10px}
  .nav-group-label{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);padding:6px 10px 4px}
  .nav-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;color:var(--muted);font-size:13px;cursor:pointer;border:none;background:none;width:100%;text-align:left}
  .nav-item:hover{background:var(--surface-2);color:var(--text)}
  .nav-item.active{background:var(--surface-2);color:var(--text);box-shadow:inset 2px 0 0 var(--blue)}
  .nav-item .ico{width:16px;text-align:center;opacity:.85}
  .nav-item .badge{margin-left:auto;font-family:var(--mono);font-size:11px;background:var(--dim);color:var(--text);padding:1px 7px;border-radius:20px}

  .dev-zone{margin-top:auto;border-top:1px solid var(--dim);padding-top:10px}
  .dev-zone .nav-group-label{color:var(--amber)}

  /* ---------- Main ---------- */
  .main{display:flex;flex-direction:column;min-width:0}
  .topbar{height:54px;border-bottom:1px solid var(--dim);display:flex;align-items:center;gap:14px;padding:0 22px;background:var(--surface)}
  .page-title{font-weight:600;font-size:15px}
  .topbar .spacer{flex:1}
  .pill{font-family:var(--mono);font-size:11px;padding:3px 10px;border-radius:20px;background:var(--surface-2);color:var(--muted);border:1px solid var(--dim)}
  .pill.on{color:var(--green);border-color:rgba(34,197,94,.4)}
  .pill.off{color:var(--red);border-color:rgba(239,68,68,.4)}
  .win-select{background:var(--surface-2);color:var(--text);border:1px solid var(--dim);border-radius:8px;padding:5px 8px;font-size:12px;font-family:var(--mono)}

  .content{padding:22px;overflow:auto;flex:1}

  /* ---------- Cards / grid ---------- */
  .grid{display:grid;gap:var(--gap)}
  .grid.cols-4{grid-template-columns:repeat(4,1fr)}
  .grid.cols-3{grid-template-columns:repeat(3,1fr)}
  .grid.cols-2{grid-template-columns:repeat(2,1fr)}
  @media(max-width:1100px){.grid.cols-4{grid-template-columns:repeat(2,1fr)}.grid.cols-3{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:700px){.layout{grid-template-columns:1fr}.sidebar{display:none}.grid.cols-4,.grid.cols-3,.grid.cols-2{grid-template-columns:1fr}}

  .card{background:var(--surface);border:1px solid var(--dim);border-radius:var(--radius);padding:16px}
  .card h3{margin:0 0 12px;font-size:13px;font-weight:600;color:var(--muted);letter-spacing:.02em}
  .stat{background:var(--surface);border:1px solid var(--dim);border-radius:var(--radius);padding:14px 16px}
  .stat .label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
  .stat .value{font-family:var(--mono);font-size:26px;font-weight:600;margin-top:6px}
  .stat .sub{font-size:11px;color:var(--faint);margin-top:4px}
  .stat .value.good{color:var(--green)} .stat .value.warn{color:var(--amber)} .stat .value.bad{color:var(--red)}

  /* ---------- Tables ---------- */
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{text-align:left;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;padding:8px 10px;border-bottom:1px solid var(--dim);font-weight:600}
  td{padding:8px 10px;border-bottom:1px solid var(--surface-2)}
  tr:hover td{background:var(--surface-2)}
  .num{font-family:var(--mono);text-align:right}

  .status-pill{display:inline-block;font-size:11px;padding:2px 9px;border-radius:20px;font-family:var(--mono)}
  .s-green{background:rgba(34,197,94,.15);color:var(--green)}
  .s-amber{background:rgba(245,158,11,.15);color:var(--amber)}
  .s-red{background:rgba(239,68,68,.15);color:var(--red)}
  .s-dim{background:var(--surface-2);color:var(--muted)}

  .btn{background:var(--surface-2);color:var(--text);border:1px solid var(--dim);border-radius:8px;padding:7px 13px;font-size:13px}
  .btn:hover{border-color:var(--faint)}
  .btn-primary{background:var(--blue);color:#06121f;border-color:var(--blue);font-weight:600}
  .btn-danger{background:var(--red);color:#fff;border-color:var(--red)}
  .btn-sm{padding:4px 9px;font-size:12px}

  .empty{color:var(--faint);font-size:13px;padding:20px;text-align:center}
  .err-inline{color:var(--red);font-size:12px;padding:10px;border:1px dashed rgba(239,68,68,.4);border-radius:8px}
  .muted{color:var(--muted)} .faint{color:var(--faint)}
  .dev-banner{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.35);color:var(--amber);padding:8px 14px;border-radius:8px;font-size:12px;margin-bottom:16px}

  /* ---------- Setup / toast ---------- */
  .center-screen{display:flex;align-items:center;justify-content:center;height:100vh;padding:20px}
  .setup-card{background:var(--surface);border:1px solid var(--dim);border-radius:var(--radius);padding:28px;width:420px;max-width:100%}
  .setup-card h2{margin:0 0 4px;font-size:18px}
  .setup-card p{margin:0 0 18px;color:var(--muted);font-size:13px}
  .form-group{margin-bottom:14px}
  .form-label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px}
  .form-input{width:100%;background:var(--surface-2);border:1px solid var(--dim);border-radius:8px;padding:9px 11px;color:var(--text);font-size:13px;font-family:var(--mono)}
  .toast-wrap{position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;gap:8px;z-index:9999}
  .toast{background:var(--surface-2);border:1px solid var(--dim);border-radius:8px;padding:10px 16px;font-size:13px;box-shadow:0 6px 24px rgba(0,0,0,.4)}
  .toast.ok{border-color:rgba(34,197,94,.5)} .toast.err{border-color:rgba(239,68,68,.5)}
  .spinner{color:var(--muted);font-size:13px;padding:30px;text-align:center}
</style>
</head>
<body>

<!-- ============ SETUP SCREEN ============ -->
<div id="setup-screen" class="center-screen">
  <div class="setup-card">
    <h2>Content Curator</h2>
    <p>Connect to your Worker API. The secret is stored only in this browser.</p>
    <div class="form-group">
      <label class="form-label">API URL</label>
      <input class="form-input" id="setup-url" placeholder="https://content-curator.YOUR_ACCOUNT.workers.dev">
    </div>
    <div class="form-group">
      <label class="form-label">Internal API Secret</label>
      <input class="form-input" id="setup-secret" type="password" placeholder="your-internal-api-secret">
    </div>
    <button class="btn btn-primary" style="width:100%" onclick="setupConnect()">Connect</button>
    <div id="setup-err" style="margin-top:12px;font-size:13px;color:var(--red);text-align:center"></div>
  </div>
</div>

<!-- ============ APP ============ -->
<div class="app" id="app">
  <div class="layout">
    <!-- Sidebar -->
    <nav class="sidebar">
      <div>
        <div class="brand">Content Curator<small>Operations Console</small></div>
        <div class="env-pill" id="env-pill">connecting…</div>
      </div>

      <div class="nav-group" id="nav-admin"></div>

      <div class="dev-zone">
        <div class="nav-group" id="nav-dev"></div>
        <button class="nav-item" style="color:var(--faint)" onclick="logout()">
          <span class="ico">⏻</span><span>Sign out</span>
        </button>
      </div>
    </nav>

    <!-- Main -->
    <div class="main">
      <div class="topbar">
        <span class="page-title" id="page-title">Overview</span>
        <span class="spacer"></span>
        <select class="win-select" id="window-select" onchange="onWindowChange()">
          <option value="24">24h</option>
          <option value="48">48h</option>
          <option value="72">72h</option>
        </select>
        <span class="pill" id="pill-curation">curation —</span>
        <span class="pill" id="pill-publish">publish —</span>
        <span class="pill" id="pill-scheduler">scheduler —</span>
      </div>
      <div class="content" id="content"><div class="spinner">Loading…</div></div>
    </div>
  </div>
</div>

<div class="toast-wrap" id="toast-wrap"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="config.js"></script>
<script>
/* =========================================================================
   STRINGS — single source for UI text (English). Future i18n hooks here.
   ========================================================================= */
const T = {
  overview:'Overview', pipeline:'Pipeline Health', sources:'Sources',
  queue:'Queue', content:'Content', cost:'Cost', settings:'Settings',
  logs:'Logs & Events', runs:'Rotation Runs', rawTracker:'Raw Item Tracker',
  debug:'Debug Tools',
};

/* =========================================================================
   NAV MODEL — two layers: ADMIN (management) vs DEV (logs/tracking/debug).
   Admin sees management, edits, access. Dev zone holds noisy logs/tracking,
   hidden from the main flow.
   ========================================================================= */
const ADMIN_PAGES = [
  { id:'monitoring', label:'Monitoring', ico:'📈' },
  { id:'overview', label:T.overview, ico:'◎' },
  { id:'pipeline', label:T.pipeline, ico:'⚗' },
  { id:'sources',  label:T.sources,  ico:'⊞' },
  { id:'queue',    label:T.queue,    ico:'≣', badge:'queue' },
  { id:'content',  label:T.content,  ico:'▦' },
  { id:'cost',     label:T.cost,     ico:'$' },
  { id:'settings', label:T.settings, ico:'⚙' },
];
const DEV_PAGES = [
  { id:'runs',       label:T.runs,       ico:'↻' },
  { id:'logs',       label:T.logs,       ico:'≡' },
  { id:'tracker',    label:T.rawTracker, ico:'⊡' },
  { id:'debug',      label:T.debug,      ico:'⌗' },
];

let CURRENT_PAGE = 'monitoring';
let WINDOW_HOURS = 24;
let MONITOR_BUCKET = 'day';
let POLL_TIMER = null;

/* =========================================================================
   API LAYER — single resilient fetch helper.
   - secret + url from localStorage (unchanged auth model)
   - 401 → re-prompt; other errors throw with context
   - never crashes the page; callers wrap in try/catch per card
   ========================================================================= */
function getApiUrl(){ return localStorage.getItem('curator_api_url') || window.CURATOR_API_URL || ''; }
function getSecret(){ return localStorage.getItem('curator_secret') || ''; }

async function api(path, opts = {}){
  const { method='GET', body } = opts;
  const res = await fetch(getApiUrl() + path, {
    method,
    headers: { 'content-type':'application/json', 'x-internal-api-secret':getSecret() },
    body: body ? JSON.stringify(body) : undefined,
  });
  if (res.status === 401){ logout(); throw new Error('unauthorized'); }
  if (!res.ok) throw new Error(path + ' → HTTP ' + res.status);
  const ct = res.headers.get('content-type') || '';
  return ct.includes('application/json') ? res.json() : res.text();
}

/* Safe card renderer: isolate failures so one bad endpoint doesn't blank page */
async function safeCard(el, loader){
  try { return await loader(); }
  catch(e){ el.innerHTML = '<div class="err-inline">Failed to load: '+escapeHtml(e.message)+'</div>'; }
}

/* =========================================================================
   UTIL
   ========================================================================= */
function escapeHtml(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmtNum(n){ return (n==null||isNaN(n))?'—':new Intl.NumberFormat('en-US').format(n); }
function fmtPct(n){ return (n==null||isNaN(n))?'—':n.toFixed(1)+'%'; }
function fmtUtc(iso){ if(!iso) return '—'; try{ return new Intl.DateTimeFormat('en-US',{dateStyle:'short',timeStyle:'short',timeZone:'UTC'}).format(new Date(iso))+' UTC'; }catch{ return String(iso);} }
function el(id){ return document.getElementById(id); }
function toast(msg,type='ok'){ const w=el('toast-wrap'); const t=document.createElement('div'); t.className='toast '+type; t.textContent=msg; w.appendChild(t); setTimeout(()=>t.remove(),3200); }

function statCard(label,value,opts={}){
  const cls = opts.tone? ' '+opts.tone : '';
  return '<div class="stat"><div class="label">'+escapeHtml(label)+'</div>'+
    '<div class="value'+cls+'">'+escapeHtml(value)+'</div>'+
    (opts.sub? '<div class="sub">'+escapeHtml(opts.sub)+'</div>':'')+'</div>';
}
function pill(text,status){ return '<span class="status-pill s-'+status+'">'+escapeHtml(text)+'</span>'; }

/* ---------- Chart helpers (Chart.js, distribution charts from real data) ---------- */
let CHART_REGISTRY = [];
function destroyCharts(){ CHART_REGISTRY.forEach(c=>{ try{c.destroy();}catch(e){} }); CHART_REGISTRY=[]; }
const CHART_COLORS = ['#60a5fa','#22c55e','#f59e0b','#a78bfa','#22d3ee','#ef4444','#f472b6','#84cc16','#fb923c','#38bdf8'];
function chartReady(){ return typeof Chart !== 'undefined'; }

function makeCanvas(id,height){ return '<div style="position:relative;height:'+(height||220)+'px"><canvas id="'+id+'"></canvas></div>'; }

function drawBar(canvasId, labels, values, opts={}){
  if(!chartReady()) return;
  const ctx = el(canvasId); if(!ctx) return;
  const c = new Chart(ctx, {
    type: opts.horizontal?'bar':'bar',
    data:{ labels, datasets:[{ label:opts.label||'', data:values,
      backgroundColor: opts.color || CHART_COLORS[0], borderRadius:4, maxBarThickness:34 }] },
    options:{ indexAxis: opts.horizontal?'y':'x', responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false} },
      scales:{ x:{ ticks:{color:'#8a8a98',font:{size:11}}, grid:{color:'#1b1b20'} },
               y:{ ticks:{color:'#8a8a98',font:{size:11}}, grid:{color:'#1b1b20'} } } }
  });
  CHART_REGISTRY.push(c);
}
function drawDonut(canvasId, labels, values){
  if(!chartReady()) return;
  const ctx = el(canvasId); if(!ctx) return;
  const c = new Chart(ctx, {
    type:'doughnut',
    data:{ labels, datasets:[{ data:values, backgroundColor:CHART_COLORS, borderColor:'#151518', borderWidth:2 }] },
    options:{ responsive:true, maintainAspectRatio:false, cutout:'62%',
      plugins:{ legend:{ position:'right', labels:{color:'#8a8a98',font:{size:11},boxWidth:12} } } }
  });
  CHART_REGISTRY.push(c);
}
/* Funnel as a horizontal stacked-ish bar (descending stages) */
function drawFunnel(canvasId, stages){ // stages: [{label,value}]
  if(!chartReady()) return;
  drawBar(canvasId, stages.map(s=>s.label), stages.map(s=>s.value), {horizontal:true, color:'#60a5fa', label:'count'});
}
/* Multi-series line chart for trends (daily/weekly/monthly) */
function drawLine(canvasId, labels, datasets){ // datasets: [{label,data,color}]
  if(!chartReady()) return;
  const ctx = el(canvasId); if(!ctx) return;
  const c = new Chart(ctx, {
    type:'line',
    data:{ labels, datasets: datasets.map((d,i)=>({
      label:d.label, data:d.data, borderColor:d.color||CHART_COLORS[i%CHART_COLORS.length],
      backgroundColor:(d.color||CHART_COLORS[i%CHART_COLORS.length])+'22',
      borderWidth:2, tension:0.3, fill:!!d.fill, pointRadius:2, pointHoverRadius:5 })) },
    options:{ responsive:true, maintainAspectRatio:false, interaction:{mode:'index',intersect:false},
      plugins:{ legend:{ labels:{color:'#8a8a98',font:{size:11},boxWidth:12} } },
      scales:{ x:{ ticks:{color:'#8a8a98',font:{size:10},maxRotation:0,autoSkip:true,maxTicksLimit:12}, grid:{color:'#1b1b20'} },
               y:{ beginAtZero:true, ticks:{color:'#8a8a98',font:{size:11}}, grid:{color:'#1b1b20'} } } }
  });
  CHART_REGISTRY.push(c);
}

/* =========================================================================
   SETUP / AUTH
   ========================================================================= */
function setupConnect(){
  const url = el('setup-url').value.trim();
  const secret = el('setup-secret').value.trim();
  if(!url || !secret){ el('setup-err').textContent='Both fields are required.'; return; }
  localStorage.setItem('curator_api_url', url);
  localStorage.setItem('curator_secret', secret);
  boot();
}
function logout(){
  localStorage.removeItem('curator_secret');
  if(POLL_TIMER) clearInterval(POLL_TIMER);
  el('app').style.display='none';
  el('setup-screen').style.display='flex';
}

/* =========================================================================
   NAV RENDER
   ========================================================================= */
function renderNav(){
  el('nav-admin').innerHTML =
    '<div class="nav-group-label">Management</div>' +
    ADMIN_PAGES.map(p=>navItemHtml(p)).join('');
  el('nav-dev').innerHTML =
    '<div class="nav-group-label">Developer</div>' +
    DEV_PAGES.map(p=>navItemHtml(p)).join('');
}
function navItemHtml(p){
  const active = p.id===CURRENT_PAGE ? ' active':'';
  const badge = p.badge? '<span class="badge" id="badge-'+p.badge+'">—</span>':'';
  return '<button class="nav-item'+active+'" onclick="nav(\''+p.id+'\')">'+
    '<span class="ico">'+p.ico+'</span><span>'+escapeHtml(p.label)+'</span>'+badge+'</button>';
}

function nav(page){
  CURRENT_PAGE = page;
  const all=[...ADMIN_PAGES,...DEV_PAGES];
  const p = all.find(x=>x.id===page) || all[0];
  el('page-title').textContent = p.label;
  renderNav();
  loadPage(page);
}

/* =========================================================================
   PAGE ROUTER — Stage 1 stubs; real renderers arrive in later stages.
   ========================================================================= */
const DEV_PAGE_IDS = DEV_PAGES.map(p=>p.id);

let CHART_QUEUE = [];
function queueChart(fn){ CHART_QUEUE.push(fn); }
function flushCharts(){ const q=CHART_QUEUE; CHART_QUEUE=[]; q.forEach(fn=>{ try{fn();}catch(e){console.warn('chart draw failed',e);} }); }

async function loadPage(page){
  const c = el('content');
  destroyCharts();
  CHART_QUEUE = [];
  const isDev = DEV_PAGE_IDS.includes(page);
  c.innerHTML = (isDev? '<div class="dev-banner">Developer view — verbose logs and raw tracking. Not part of the management surface.</div>':'')
    + '<div class="spinner">Loading '+escapeHtml(page)+'…</div>';

  const renderer = PAGE_RENDERERS[page];
  if(!renderer){ c.innerHTML += '<div class="empty">Coming in a later stage.</div>'; return; }
  const host = document.createElement('div');
  await safeCard(host, ()=>renderer(host));
  c.innerHTML = (isDev? '<div class="dev-banner">Developer view — verbose logs and raw tracking. Not part of the management surface.</div>':'');
  c.appendChild(host);
  flushCharts();
}

/* =========================================================================
   PAGE RENDERERS — field names verified against backend builders.
   ========================================================================= */
const PAGE_RENDERERS = {

  /* ---------- MONITORING (executive trends: daily/weekly/monthly) ---------- */
  monitoring: async (host)=>{
    const bucket = MONITOR_BUCKET;
    const days = bucket==='month'? 365 : (bucket==='week'? 120 : 30);
    const ts = await api('/internal/report/timeseries?bucket='+bucket+'&days='+days).catch(()=>({series:[]}));
    const series = ts.series || [];

    // headline KPIs = sums over the window
    const sum = (k)=> series.reduce((a,r)=>a+(r[k]||0),0);
    const totalPub = sum('published');
    const totalScraped = sum('scraped');
    const totalSelected = sum('selected');
    const totalTokens = sum('ai_tokens');
    const selectRate = totalScraped? (totalSelected/totalScraped*100):0;
    const pubPerActiveBucket = series.length? (totalPub/series.length):0;

    const bucketBtns = ['day','week','month'].map(b=>
      '<button class="btn btn-sm'+(b===bucket?' btn-primary':'')+'" onclick="setMonitorBucket(\''+b+'\')">'+
      (b==='day'?'Daily':b==='week'?'Weekly':'Monthly')+'</button>').join(' ');

    const labels = series.map(r=>r.bucket);

    host.innerHTML =
      '<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">'+
        '<span class="muted">Granularity:</span>'+bucketBtns+
        '<span class="faint" style="margin-left:auto">'+series.length+' '+bucket+' buckets · all times UTC</span></div>'+
      '<div class="grid cols-4" style="margin-bottom:16px">'+
        statCard('Published', fmtNum(totalPub), {tone:'good', sub:'~'+pubPerActiveBucket.toFixed(1)+' / '+bucket})+
        statCard('Scraped', fmtNum(totalScraped))+
        statCard('Select rate', selectRate.toFixed(1)+'%', {tone: selectRate>=15?'good':(selectRate>=5?'warn':'bad'), sub:'selected / scraped'})+
        statCard('AI tokens', fmtNum(totalTokens))+
      '</div>'+
      '<div class="card" style="margin-bottom:16px"><h3>Publishing & scraping trend</h3>'+makeCanvas('chart-trend-vol',260)+'</div>'+
      '<div class="grid cols-2">'+
        '<div class="card"><h3>Selected vs rejected</h3>'+makeCanvas('chart-trend-quality',230)+'</div>'+
        '<div class="card"><h3>AI usage (calls & tokens)</h3>'+makeCanvas('chart-trend-ai',230)+'</div>'+
      '</div>'+
      (series.length? '' : '<div class="empty" style="margin-top:16px">No time-series data yet. Once the pipeline runs for a few '+bucket+'s, trends appear here.</div>');

    if(series.length){
      queueChart(()=>drawLine('chart-trend-vol', labels, [
        {label:'Published', data:series.map(r=>r.published), color:'#22c55e', fill:true},
        {label:'Scraped', data:series.map(r=>r.scraped), color:'#60a5fa'},
      ]));
      queueChart(()=>drawLine('chart-trend-quality', labels, [
        {label:'Selected', data:series.map(r=>r.selected), color:'#22c55e'},
        {label:'Rejected', data:series.map(r=>r.rejected), color:'#ef4444'},
      ]));

  /* ---------- SOURCES ---------- */
  sources: async (host)=>{
    const [srcRes, yieldRes, queryRes, perfRes] = await Promise.all([
      api('/internal/apify-sources').catch(()=>({sources:[]})),
      api('/internal/report/source-yield?hours='+WINDOW_HOURS).catch(()=>({sources:[]})),
      api('/internal/report/apify-query-yield?hours='+WINDOW_HOURS).catch(()=>({sources:[]})),
      api('/internal/report/source-performance?hours='+WINDOW_HOURS).catch(()=>({sources:[],publishedByBucket:[]})),
    ]);
    const sources = srcRes.sources || [];
    const queryByAcct = indexBy(queryRes.sources||[], 'sourceAccount');

    let rows = sources.map(src=>{
      const enabled = src.enabled===1 || src.enabled===true;
      return '<tr>'+
        '<td><code>'+escapeHtml(src.id)+'</code></td>'+
        '<td>'+escapeHtml(src.platform||'—')+'</td>'+
        '<td>'+pill(enabled?'enabled':'disabled', enabled?'green':'dim')+'</td>'+

      '</tr>';
    }).join('') || '<tr><td colspan="4" class="empty">No sources configured.</td></tr>';

    const yieldSorted = (yieldRes.sources||[]).sort((a,b)=>b.candidates-a.candidates);
    const yieldRows = yieldSorted.map(y=>{
      const q = queryByAcct[y.sourceAccount] || {};
      const yPct = (y.publishYield!=null? (y.publishYield*100):0);
      const tone = yPct>=20?'s-green':(yPct>=5?'s-amber':'s-red');
      return '<tr>'+
        '<td><code>'+escapeHtml(y.sourceAccount)+'</code></td>'+
        '<td class="num">'+fmtNum(y.candidates)+'</td>'+
        '<td class="num">'+fmtNum(y.aiRejected)+'</td>'+
        '<td class="num">'+fmtNum(y.published)+'</td>'+
        '<td class="num">'+pill(yPct.toFixed(1)+'%', tone)+'</td>'+
        '<td class="num">'+fmtNum(q.duplicates||0)+'</td>'+
      '</tr>';
    }).join('') || '<tr><td colspan="6" class="empty">No yield data in window.</td></tr>';

    // source reputation (from source-performance)
    const repSorted = (perfRes.sources||[]).sort((a,b)=>(b.reputation||0)-(a.reputation||0));
    const repRows = repSorted.map(s=>{
      const rep = Math.round(s.reputation||0);
      const tone = rep>=60?'s-green':(rep>=35?'s-amber':'s-red');
      return '<tr><td><code>'+escapeHtml(s.sourceAccount)+'</code></td>'+
        '<td class="num">'+fmtNum(s.published)+'</td>'+
        '<td class="num">'+((s.acceptanceRate!=null)?(s.acceptanceRate*100).toFixed(0)+'%':'—')+'</td>'+
        '<td class="num">'+((s.dominanceShare!=null)?(s.dominanceShare*100).toFixed(0)+'%':'—')+'</td>'+
        '<td class="num">'+pill(String(rep), tone)+'</td></tr>';
    }).join('') || '<tr><td colspan="5" class="empty">No reputation data.</td></tr>';

    host.innerHTML =
      '<div class="card" style="margin-bottom:16px"><h3>Published volume by account · last '+WINDOW_HOURS+'h</h3>'+makeCanvas('chart-srcyield',240)+'</div>'+
      '<div class="grid cols-2" style="margin-bottom:16px">'+
        '<div class="card"><h3>Per-account yield <span class="faint">(candidates → published)</span></h3>'+
          '<table><thead><tr><th>Account</th><th class="num">Cand.</th><th class="num">AI rej.</th><th class="num">Pub.</th><th class="num">Yield</th><th class="num">Dupes</th></tr></thead><tbody>'+yieldRows+'</tbody></table></div>'+
        '<div class="card"><h3>Source reputation</h3>'+
          '<table><thead><tr><th>Account</th><th class="num">Pub.</th><th class="num">Accept</th><th class="num">Dominance</th><th class="num">Score</th></tr></thead><tbody>'+repRows+'</tbody></table></div>'+
      '</div>'+
      '<div class="card"><h3>Configured sources</h3>'+
        '<table><thead><tr><th>ID</th><th>Platform</th><th>State</th><th></th></tr></thead><tbody>'+rows+'</tbody></table></div>';

    const top = yieldSorted.slice(0,10);

    host.innerHTML =
      '<div style="margin-bottom:14px;display:flex;gap:6px;flex-wrap:wrap">'+tabs+'</div>'+
      '<div class="card"><h3>Raw items · status='+sel+'</h3><table><thead><tr><th>ID</th><th>Text</th><th>Account</th><th class="num">Score</th><th>Reject reason</th></tr></thead><tbody>'+rows+'</tbody></table></div>';
  },

  /* ---------- DEBUG TOOLS (dev) ---------- */
  debug: async (host)=>{
    const res = await api('/internal/debug/crypto-pipeline').catch(e=>({error:e.message}));
    host.innerHTML =
      '<div class="card"><h3>Crypto pipeline debug snapshot</h3>'+
        '<pre class="mono" style="font-size:11px;color:var(--muted);overflow:auto;max-height:500px">'+escapeHtml(JSON.stringify(res,null,2))+'</pre></div>';
  },

};

function flagRow(label,on){
  return '<div style="display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--surface-2)">'+
    '<span class="muted">'+escapeHtml(label)+'</span>'+pill(on?'on':'off', on?'green':'dim')+'</div>';
}
function indexBy(arr,key){ const m={}; (arr||[]).forEach(x=>{ m[x[key]]=x; }); return m; }

function setMonitorBucket(b){ MONITOR_BUCKET=b; loadPage('monitoring'); }

async function toggleSource(id,enable){
  if(!enable && !confirm('Disable source '+id+'?\n\nIt will stop being scraped until re-enabled.')) return;
  try{
    await api('/internal/apify-sources/'+encodeURIComponent(id), {method:'PATCH', body:{enabled:enable}});
    toast((enable?'Enabled ':'Disabled ')+id,'ok');
    loadPage('sources');
  }catch(e){ toast('Toggle failed: '+e.message,'err'); }
}

/* Settings toggle — only ALLOWED_KEYS accepted server-side; value is bool string */
async function toggleSetting(key,enable){
  // Guard the high-impact flags with a confirmation.
  const HIGH_IMPACT = { telegram_publish_enabled:'live Telegram publishing', maintenance_mode:'maintenance mode' };
  if(HIGH_IMPACT[key]){
    const verb = enable?'ENABLE':'DISABLE';
    if(!confirm(verb+' '+HIGH_IMPACT[key]+'?\n\nThis affects the live channel. Continue?')) return;
  }
  try{
    await api('/internal/admin/toggle', {method:'POST', body:{key, value:String(enable)}});
    toast(key+' → '+(enable?'on':'off'),'ok');
    loadPills();
    loadPage('settings');
  }catch(e){ toast('Toggle failed: '+e.message,'err'); }
}

async function triggerCuration(){
  try{ await api('/internal/curation/trigger', {method:'POST', body:{}}); toast('Curation triggered','ok'); setTimeout(()=>loadPage('runs'),1500); }
  catch(e){ toast('Trigger failed: '+e.message,'err'); }
}
async function drainBacklog(){
  try{ const r=await api('/internal/backlog/drain', {method:'POST', body:{}}); toast('Drain done','ok'); loadPage('logs'); }
  catch(e){ toast('Drain failed: '+e.message,'err'); }
}
let TRACKER_STATUS = 'ai_rejected';
function setTrackerStatus(s){ TRACKER_STATUS = s; loadPage('tracker'); }

/* =========================================================================
   TOPBAR PILLS — control flags (read-only display)
   ========================================================================= */
async function loadPills(){
  try{
    const s = await api('/internal/admin/settings');
    const get=(k)=> (s.settings? s.settings[k] : s[k]);
    setPill('pill-curation','curation', truthy(get('APIFY_CURATION_ENABLED')));
    setPill('pill-publish','publish', truthy(get('TELEGRAM_FINAL_PUBLISH_ENABLED')));
    setPill('pill-scheduler','scheduler', truthy(get('TELEGRAM_PUBLISH_SCHEDULER_ENABLED')));
  }catch(e){ /* pills are non-critical */ }
}
function truthy(v){ return v===true || v==='true' || v===1 || v==='1'; }
function setPill(id,label,on){ const p=el(id); if(!p) return; p.textContent=label+' '+(on?'on':'off'); p.className='pill '+(on?'on':'off'); }

/* =========================================================================
   POLLING — refresh active page; pause when tab hidden
   ========================================================================= */
function startPolling(){
  if(POLL_TIMER) clearInterval(POLL_TIMER);
  POLL_TIMER = setInterval(()=>{
    if(document.hidden) return;
    loadPills();
    // Don't auto-refresh heavy developer tabs (debug snapshot, raw logs) — only
    // refresh lightweight management views on the timer.
    if(!DEV_PAGE_IDS.includes(CURRENT_PAGE)) loadPage(CURRENT_PAGE);
  }, 45000);
}
document.addEventListener('visibilitychange',()=>{ if(!document.hidden){ loadPills(); } });

function onWindowChange(){ WINDOW_HOURS = parseInt(el('window-select').value,10)||24; loadPage(CURRENT_PAGE); }

/* =========================================================================
   BOOT
   ========================================================================= */
async function boot(){
  el('setup-screen').style.display='none';
  el('app').style.display='block';
  renderNav();
  try{
    const h = await api('/health');
    el('env-pill').textContent = (h.environment || h.env || 'connected');
  }catch(e){
    el('env-pill').textContent='connection error';
    toast('Cannot reach API. Check URL/secret.','err');
  }
  loadPills();
  nav('monitoring');
  startPolling();
}

(function init(){
  const url=getApiUrl(), secret=getSecret();
  if(url){ el('setup-url').value=url; }
  if(url && secret){ boot(); }
  else { el('setup-screen').style.display='flex'; }
})();
</script>
