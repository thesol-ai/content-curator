name: Deploy to Cloudflare

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy Worker
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Deploy Worker
        run: npx wrangler deploy --env ${{ inputs.environment }} --config wrangler.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Verify deployment
        run: |
          sleep 5
          STATUS=$(curl -sf "https://${{ vars.WORKER_URL }}/health" | python3 -c "import sys,json; d=json.load(sys.stdin); print('ok' if d.get('ok') else 'fail')" 2>/dev/null || echo "unreachable")
          echo "Health check: $STATUS"
          if [ "$STATUS" != "ok" ]; then
            echo "WARNING: Health check failed or worker URL not configured"
          fi
